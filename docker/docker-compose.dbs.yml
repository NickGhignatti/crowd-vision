services:
  auth-db:
    image: mongo:latest
    networks:
      - auth-net
    volumes:
      - auth-data:/data/db

  twin-db:
    image: mongo:latest
    networks:
      - twin-net
    volumes:
      - twin-data:/data/db

  sensor-db:
    image: mongo:latest
    networks:
      - sensor-net
    volumes:
      - sensor-data:/data/db

  notification-db:
    image: mongo:latest
    networks:
      - notification-net
    volumes:
      - notification-data:/data/db

  agent-db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agentdb
    networks:
      - agent-net
    volumes:
      - agent-data:/var/lib/postgresql/data

volumes:
  auth-data:
  twin-data:
  sensor-data:
  notification-data:
  agent-data:

