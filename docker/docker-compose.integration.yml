services:
  sensor-db:
    image: mongo:latest
    networks: [test-net]

  sensor-service:
    build: ./server/sensor-service
    environment:
      - MONGO_URI=mongodb://sensor-db:27017/sensordb
      - CLIENT_URL=http://localhost
    depends_on: [sensor-db]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/metrics').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks: [test-net]

  metrics-service:
    build: ./server/metrics-service
    environment:
      - PORT=3000
      - SENSOR_METRICS_URL=http://sensor-service:3000
    depends_on:
      sensor-service:
        condition: service_healthy
    ports:
      - "3100:3000" # reachable from the host at localhost:3100
    networks: [test-net]

networks:
  test-net:
