services:
  contracts-service:
    build:
      target: dev
    command: cargo watch -x run
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: rebuild
          path: ./Cargo.toml
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    volumes:
      - contracts-target:/app/target
      - cargo-registry:/usr/local/cargo/registry

  contracts-service-db:
    ports:
      - "27020:27017"

  contracts-service-db-express:
    image: mongo-express:latest
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://contracts-service-db:27017/
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=pass
      - ME_CONFIG_SITE_BASEURL=/contracts-db-gui/
    depends_on:
      - contracts-service-db

volumes:
  contracts-target:
  cargo-registry: