language: 'python'

tasks:
  test:
    script: 'npm test'
    inputs:
      - 'app/**/*'
      - 'tests/**/*'
      - 'pyproject.toml'

  lint:
    script: 'npm run lint'
    inputs:
      - 'app/**/*'
      - 'tests/**/*'
      - 'pyproject.toml'

  lint-fix:
    script: 'npm run lint:fix'
    options:
      cache: false
