services:
  agent-service:
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 3000 --reload"]
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - OBSERVE_PAYLOADS=${OBSERVE_PAYLOADS:-true}
    develop:
      watch:
        - action: sync
          path: ./app
          target: /app/server/agent-service/app
        - action: rebuild
          path: ./pyproject.toml

  agent-db:
    ports:
      - "5432:5432"
