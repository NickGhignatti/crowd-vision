openapi: 3.1.0
info:
  title: Sensor Service API
  description: API for managing and retrieving sensor signals (people count and temperature).
  version: 1.0.0
servers:
  - url: http://localhost:80/sensor/
    description: Local development server
paths:
  /metrics:
    get:
      summary: Get metric contracts exposed by sensor service
      tags:
        - Metrics
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceMetricsContract'

  /peopleCount:
    post:
      summary: Create a people count signal
      tags:
        - People Count
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - buildingId
                - roomId
                - timestamp
                - peopleCount
              properties:
                buildingId:
                  type: string
                  example: "building-123"
                roomId:
                  type: string
                  example: "room-A"
                timestamp:
                  type: integer
                  description: Unix timestamp in milliseconds
                  example: 1712836800000
                peopleCount:
                  type: integer
                  example: 42
      responses:
        '201':
          description: People count signal created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "People count signal created"
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      summary: Get latest people count signal for a specific room
      tags:
        - People Count
      parameters:
        - in: query
          name: building
          schema:
            type: string
          required: true
          description: Buildings ID
        - in: query
          name: roomId
          schema:
            type: string
          required: true
          description: Room ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  peopleCount:
                    type: object
                    description: Latest people count data
        '400':
          $ref: '#/components/responses/BadRequest'

  /temperature:
    post:
      summary: Create a temperature signal
      tags:
        - Temperature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - buildingId
                - roomId
                - timestamp
                - temperature
              properties:
                buildingId:
                  type: string
                  example: "building-123"
                roomId:
                  type: string
                  example: "room-A"
                timestamp:
                  type: integer
                  description: Unix timestamp in milliseconds
                  example: 1712836800000
                temperature:
                  type: number
                  example: 22.5
      responses:
        '201':
          description: Temperature signal created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Temperature signal created"
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      summary: Get latest temperature signal for a specific room
      tags:
        - Temperature
      parameters:
        - in: query
          name: building
          schema:
            type: string
          required: true
          description: Buildings ID
        - in: query
          name: roomId
          schema:
            type: string
          required: true
          description: Room ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  temperature:
                    type: object
                    description: Latest temperature data
        '400':
          $ref: '#/components/responses/BadRequest'

  /air-quality:
    post:
      summary: Create an air quality signal
      tags:
        - Air Quality
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - buildingId
                - roomId
                - timestamp
                - pm25
                - pm10
                - co2
                - voc
                - temperature
                - humidity
                - aqi
                - indoor_aqi
              properties:
                buildingId:
                  type: string
                  example: "building-123"
                roomId:
                  type: string
                  example: "room-A"
                timestamp:
                  type: integer
                  description: Unix timestamp in milliseconds
                  example: 1712836800000
                scenario:
                  type: string
                  example: "clean_indoor"
                pm25:
                  type: number
                  example: 6.2
                pm10:
                  type: number
                  example: 12.5
                co2:
                  type: number
                  example: 520
                voc:
                  type: number
                  example: 120
                temperature:
                  type: number
                  example: 21.8
                humidity:
                  type: number
                  example: 45
                aqi:
                  type: number
                  example: 32
                indoor_aqi:
                  type: number
                  example: 45.5
      responses:
        '201':
          description: Air quality signal created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Air quality signal created"
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      summary: Get latest air quality signal for a specific room
      tags:
        - Air Quality
      parameters:
        - in: query
          name: building
          schema:
            type: string
          required: true
          description: Buildings ID
        - in: query
          name: roomId
          schema:
            type: string
          required: true
          description: Room ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  airQuality:
                    type: object
                    description: Latest air quality data
        '400':
          $ref: '#/components/responses/BadRequest'

  /peopleCount/entireBuilding:
    get:
      summary: Get all latest people count signals for an entire building
      tags:
        - People Count
      parameters:
        - in: query
          name: building
          schema:
            type: string
          required: true
          description: Buildings ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  peopleCount:
                    type: array
                    items:
                      type: object
                    description: Array of latest people count signals for the building
        '400':
          $ref: '#/components/responses/BadRequest'

  /temperature/entireBuilding:
    get:
      summary: Get all latest temperature signals for an entire building
      tags:
        - Temperature
      parameters:
        - in: query
          name: building
          schema:
            type: string
          required: true
          description: Buildings ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  temperature:
                    type: array
                    items:
                      type: object
                    description: Array of latest temperature signals for the building
        '400':
          $ref: '#/components/responses/BadRequest'

  /air-quality/entireBuilding:
    get:
      summary: Get all latest air quality signals for an entire building
      tags:
        - Air Quality
      parameters:
        - in: query
          name: building
          schema:
            type: string
          required: true
          description: Buildings ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  airQuality:
                    type: array
                    items:
                      type: object
                    description: Array of latest air quality signals for the building
        '400':
          $ref: '#/components/responses/BadRequest'

  /peopleCount/dashboard:
    get:
      summary: Get people count dashboard data for a room
      tags:
        - People Count
      parameters:
        - in: query
          name: building
          schema:
            type: string
          required: true
          description: Buildings ID
        - in: query
          name: roomId
          schema:
            type: string
          required: true
          description: Room ID
        - in: query
          name: timeRange
          schema:
            type: string
          required: true
          description: Time range for dashboard data
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  peopleCount:
                    type: array
                    items:
                      type: object
                    description: Aggregated people count data
        '400':
          $ref: '#/components/responses/BadRequest'

  /temperature/dashboard:
    get:
      summary: Get temperature dashboard data for a room
      tags:
        - Temperature
      parameters:
        - in: query
          name: building
          schema:
            type: string
          required: true
          description: Buildings ID
        - in: query
          name: roomId
          schema:
            type: string
          required: true
          description: Room ID
        - in: query
          name: timeRange
          schema:
            type: string
          required: true
          description: Time range for dashboard data
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  temperature:
                    type: array
                    items:
                      type: object
                    description: Aggregated temperature data
        '400':
          $ref: '#/components/responses/BadRequest'

  /air-quality/dashboard:
    get:
      summary: Get air quality dashboard data for a room
      tags:
        - Air Quality
      parameters:
        - in: query
          name: building
          schema:
            type: string
          required: true
          description: Buildings ID
        - in: query
          name: roomId
          schema:
            type: string
          required: true
          description: Room ID
        - in: query
          name: timeRange
          schema:
            type: string
          required: true
          description: Time range for dashboard data
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  airQuality:
                    type: array
                    items:
                      type: object
                    description: Aggregated air quality data
        '400':
          $ref: '#/components/responses/BadRequest'

  /peopleCount/dashboard/entireBuilding:
    get:
      summary: Get people count dashboard data for an entire building
      tags:
        - People Count
      parameters:
        - in: query
          name: building
          schema:
            type: string
          required: true
          description: Buildings ID
        - in: query
          name: timeRange
          schema:
            type: string
          required: true
          description: Time range for dashboard data
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  peopleCount:
                    type: array
                    items:
                      type: object
                    description: Aggregated people count data for the building
        '400':
          $ref: '#/components/responses/BadRequest'

  /temperature/dashboard/entireBuilding:
    get:
      summary: Get temperature dashboard data for an entire building
      tags:
        - Temperature
      parameters:
        - in: query
          name: building
          schema:
            type: string
          required: true
          description: Buildings ID
        - in: query
          name: timeRange
          schema:
            type: string
          required: true
          description: Time range for dashboard data
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  temperature:
                    type: array
