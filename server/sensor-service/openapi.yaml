                      type: object
                    description: Aggregated temperature data for the building
        '400':
          $ref: '#/components/responses/BadRequest'

  /air-quality/dashboard/entireBuilding:
    get:
      summary: Get air quality dashboard data for an entire building
      tags:
        - Air Quality
      parameters:
        - in: query
          name: building
          schema:
            type: string
          required: true
          description: Buildings ID
        - in: query
          name: timeRange
          schema:
            type: string
          required: true
          description: Time range for dashboard data
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  airQuality:
                    type: array
                    items:
                      type: object
                    description: Aggregated air quality data for the building
        '400':
          $ref: '#/components/responses/BadRequest'

components:
  schemas:
    MetricFieldContract:
      type: object
      required:
        - name
        - type
        - required
      properties:
        name:
          type: string
        type:
          type: string
          enum:
            - string
            - number
            - boolean
            - integer
        required:
          type: boolean
        description:
          type: string
    MetricContract:
      type: object
      required:
        - metricKey
        - label
        - interfaceName
        - fields
      properties:
        metricKey:
          type: string
          example: temperature
        label:
          type: string
          example: Temperature
        interfaceName:
          type: string
          example: ITemperature
        unit:
          type: string
          example: C
        fields:
          type: array
          items:
            $ref: '#/components/schemas/MetricFieldContract'
    ServiceMetricsContract:
      type: object
      required:
        - service
        - metrics
      properties:
        service:
          type: string
          example: sensor-service
        metrics:
          type: array
          items:
            $ref: '#/components/schemas/MetricContract'
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Invalid input provided"
