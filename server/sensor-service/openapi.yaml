openapi: 3.1.0
info:
  title: Sensor Service API
  description: API for managing and retrieving sensor signals (people count and temperature).
  version: 1.0.0
servers:
  - url: http://localhost:80/sensor/
    description: Local development server
paths:
  /peopleCount:
    post:
      summary: Create a people count signal
      tags:
        - People Count
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - twinId
                - roomId
                - timestamp
                - peopleCount
              properties:
                twinId:
                  type: string
                  example: "twin-123"
                roomId:
                  type: string
                  example: "room-A"
                timestamp:
                  type: string
                  format: date-time
                  example: "2023-10-01T12:00:00Z"
                peopleCount:
                  type: integer
                  example: 42
      responses:
        '201':
          description: People count signal created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "People count signal created"
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      summary: Get latest people count signal for a specific room
      tags:
        - People Count
      parameters:
        - in: query
          name: twin
          schema:
            type: string
          required: true
          description: Twin ID
        - in: query
          name: roomId
          schema:
            type: string
          required: true
          description: Room ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  peopleCount:
                    type: object
                    description: Latest people count data
        '400':
          $ref: '#/components/responses/BadRequest'

  /temperature:
    post:
      summary: Create a temperature signal
      tags:
        - Temperature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - twinId
                - roomId
                - timestamp
                - temperature
              properties:
                twinId:
                  type: string
                  example: "twin-123"
                roomId:
                  type: string
                  example: "room-A"
                timestamp:
                  type: string
                  format: date-time
                  example: "2023-10-01T12:00:00Z"
                temperature:
                  type: number
                  example: 22.5
      responses:
        '201':
          description: Temperature signal created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Temperature signal created"
        '400':
          $ref: '#/components/responses/BadRequest'
    get:
      summary: Get latest temperature signal for a specific room
      tags:
        - Temperature
      parameters:
        - in: query
          name: twin
          schema:
            type: string
          required: true
          description: Twin ID
        - in: query
          name: roomId
          schema:
            type: string
          required: true
          description: Room ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  temperature:
                    type: object
                    description: Latest temperature data
        '400':
          $ref: '#/components/responses/BadRequest'

  /peopleCount/entireTwin:
    get:
      summary: Get all latest people count signals for an entire twin
      tags:
        - People Count
      parameters:
        - in: query
          name: twin
          schema:
            type: string
          required: true
          description: Twin ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  peopleCount:
                    type: array
                    items:
                      type: object
                    description: Array of latest people count signals
        '400':
          $ref: '#/components/responses/BadRequest'

  /temperature/entireTwin:
    get:
      summary: Get all latest temperature signals for an entire twin
      tags:
        - Temperature
      parameters:
        - in: query
          name: twin
          schema:
            type: string
          required: true
          description: Twin ID
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  temperature:
                    type: array
                    items:
                      type: object
                    description: Array of latest temperature signals
        '400':
          $ref: '#/components/responses/BadRequest'

  /peopleCount/dashboard:
    get:
      summary: Get people count dashboard data for a room
      tags:
        - People Count
      parameters:
        - in: query
          name: twin
          schema:
            type: string
          required: true
          description: Twin ID
        - in: query
          name: roomId
          schema:
            type: string
          required: true
          description: Room ID
        - in: query
          name: timeRange
          schema:
            type: string
          required: true
          description: Time range for dashboard data
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  peopleCount:
                    type: array
                    items:
                      type: object
                    description: Aggregated people count data
        '400':
          $ref: '#/components/responses/BadRequest'

  /temperature/dashboard:
    get:
      summary: Get temperature dashboard data for a room
      tags:
        - Temperature
      parameters:
        - in: query
          name: twin
          schema:
            type: string
          required: true
          description: Twin ID
        - in: query
          name: roomId
          schema:
            type: string
          required: true
          description: Room ID
        - in: query
          name: timeRange
          schema:
            type: string
          required: true
          description: Time range for dashboard data
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  temperature:
                    type: array
                    items:
                      type: object
                    description: Aggregated temperature data
        '400':
          $ref: '#/components/responses/BadRequest'

  /peopleCount/dashboard/entireTwin:
    get:
      summary: Get people count dashboard data for an entire twin
      tags:
        - People Count
      parameters:
        - in: query
          name: twin
          schema:
            type: string
          required: true
          description: Twin ID
        - in: query
          name: timeRange
          schema:
            type: string
          required: true
          description: Time range for dashboard data
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  peopleCount:
                    type: array
                    items:
                      type: object
                    description: Aggregated people count data for the twin
        '400':
          $ref: '#/components/responses/BadRequest'

  /temperature/dashboard/entireTwin:
    get:
      summary: Get temperature dashboard data for an entire twin
      tags:
        - Temperature
      parameters:
        - in: query
          name: twin
          schema:
            type: string
          required: true
          description: Twin ID
        - in: query
          name: timeRange
          schema:
            type: string
          required: true
          description: Time range for dashboard data
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  temperature:
                    type: array
                    items:
                      type: object
                    description: Aggregated temperature data for the twin
        '400':
          $ref: '#/components/responses/BadRequest'

components:
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Invalid input provided"
