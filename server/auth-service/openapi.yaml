openapi: 3.1.0
info:
  title: Auth Service API
  description: API for user authentication, domain management, subscriptions, and SSO (OIDC).
  version: 1.0.0
servers:
  - url: http://localhost/auth
    description: Local gateway endpoint for Auth Service

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    UserResponse:
      type: object
      properties:
        username:
          type: string
          example: "jdoe"

    Domain:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "crowd-vision"
        subdomains:
          type: array
          items:
            type: string
          example: ["analytics", "admin"]
        authStrategy:
          type: string
          description: Authentication strategy for the domain.
          enum:
            - internal
            - oidc
          default: internal
          example: "internal"
        ssoConfig:
          type: object
          description: OIDC Configuration details for the domain
        creatorUsername:
          type: string
          example: "jdoe"

security:
  - bearerAuth: []

paths:
  /register:
    post:
      summary: Register a new user
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
                - password
              properties:
                username:
                  type: string
                  example: "jdoe"
                email:
                  type: string
                  format: email
                  example: "jdoe@example.com"
                password:
                  type: string
                  format: password
                  example: "securePassword123"
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "User creation successful"
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  user:
                    $ref: '#/components/schemas/UserResponse'
        '400':
          description: Bad request (e.g., user already exists)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /login:
    post:
      summary: Login a user
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: "jdoe"
                password:
                  type: string
                  format: password
                  example: "securePassword123"
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Login successful"
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  user:
                    $ref: '#/components/schemas/UserResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /domains:
    get:
      summary: Get all domains
      tags:
        - Domains
      responses:
        '200':
          description: List of all domains
          content:
            application/json:
              schema:
                type: object
                properties:
                  domains:
                    type: array
                    items:
                      $ref: '#/components/schemas/Domain'
        '400':
          description: Error fetching domains

    post:
      summary: Register a new domain
      tags:
        - Domains
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Domain'
      responses:
        '201':
          description: Domain registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Domain'
        '400':
          description: Error registering domain

  /domains/{username}:
    get:
      summary: Get user domain memberships
      tags:
        - Subscriptions
      parameters:
        - in: path
          name: username
          required: true
          schema:
            type: string
          description: The username to fetch domains for
      responses:
        '200':
          description: User's domains retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  domains:
                    type: array
                    items:
                      $ref: '#/components/schemas/Domain'
        '404':
          description: User not found or error retrieving domains

  /domains/{username}/subscribe:
    post:
      summary: Subscribe user to a domain (Internal Only)
      tags:
        - Subscriptions
      parameters:
        - in: path
          name: username
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - domainName
              properties:
                domainName:
                  type: string
                  example: "crowd-vision"
      responses:
        '200':
          description: Successfully subscribed
        '400':
          description: Error subscribing to domain

  /domains/{username}/unsubscribe:
    delete:
      summary: Unsubscribe user from a domain
      tags:
        - Subscriptions
      parameters:
        - in: path
          name: username
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - domainName
              properties:
                domainName:
                  type: string
                  example: "crowd-vision"
      responses:
        '200':
          description: Successfully unsubscribed
        '400':
          description: Error unsubscribing

  /sso/login/{domainName}:
    get:
      summary: Start SSO Login flow for a specific domain
      tags:
        - SSO
      parameters:
        - in: path
          name: domainName
          required: true
          schema:
            type: string
          description: The domain name requiring SSO
        - in: query
          name: username
          required: true
          schema:
            type: string
          description: The username attempting to login
      responses:
        '200':
          description: Returns the Identity Provider redirect URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  redirectUrl:
                    type: string
                    format: uri
                    example: "https://idp.example.com/auth?client_id=..."
        '400':
          description: Error generating SSO login URL

  /sso/callback:
    get:
      summary: Handle callback from Identity Provider
      tags:
        - SSO
      description: This endpoint extracts 'code' and 'state' from the URL and redirects the client appropriately.
      responses:
        '302':
          description: Redirects the user to the client application (success or failure)