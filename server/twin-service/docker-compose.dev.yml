services:
  twin-service:
    build:
      target: dev
    command: cargo watch -x run
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/server/twin-service/src
        - action: rebuild
          path: ./Cargo.toml
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    volumes:
      - twin-target:/app/server/twin-service/target
      - cargo-registry:/usr/local/cargo/registry

  twin-db:
    ports:
      - "27017:27017"

  twin-db-express:
    image: mongo-express:latest
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://twin-db:27017/
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=pass
      - ME_CONFIG_SITE_BASEURL=/twin-db-gui/
    depends_on:
      - twin-db

volumes:
  twin-target:
  cargo-registry:
