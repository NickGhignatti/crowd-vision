services:
  twin-service:
    build:
      # Repo-root context: twin-service reads the shared Cedar policy bundle
      # at ../auth-policy (relative to its own dist/), a sibling directory
      # this build needs to see. See the Dockerfile's own header comment.
      context: ../..
      dockerfile: server/twin-service/Dockerfile
    environment:
      - MONGO_URI=mongodb://twin-db:27017/twindb
      - CLIENT_URL=${DEV_URL}:${CLIENT_PORT}
      - SENSOR_SERVICE_URL=http://sensor-service:3000
      - CONTRACTS_SERVICE_URL=http://contracts-service:3000
    depends_on:
      - twin-db

  twin-db:
    image: mongo:latest
    volumes:
      - twin-data:/data/db

volumes:
  twin-data:
