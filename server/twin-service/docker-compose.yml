services:
  twin-service:
    build:
      # Repo-root context: twin-service needs to see its sibling ../auth-policy
      # dir (shared Cedar policy bundle) during build.
      context: ../..
      dockerfile: server/twin-service/Dockerfile
    environment:
      - MONGO_URI=mongodb://twin-db:27017/twindb
      - SENSOR_SERVICE_URL=http://sensor-service:3000
      - CONTRACTS_SERVICE_URL=http://contracts-service:3000
    depends_on:
      - twin-db

  twin-db:
    image: mongo:latest
    volumes:
      - twin-data:/data/db

volumes:
  twin-data:
