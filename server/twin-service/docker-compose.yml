services:
  twin-service:
    build:
      context: .
    environment:
      - MONGO_URI=mongodb://twin-db:27017/twindb
      - CLIENT_URL=${DEV_URL}:${CLIENT_PORT}
      - SENSOR_SERVICE_URL=http://sensor-service:3000
      - CONTRACTS_SERVICE_URL=http://contracts-service:3000
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - twin-db

  twin-db:
    image: mongo:latest
    volumes:
      - twin-data:/data/db

volumes:
  twin-data:
