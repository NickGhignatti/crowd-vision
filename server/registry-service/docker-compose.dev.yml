services:
  registry-service:
    build:
      target: dev
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    develop:
      watch:
        - action: sync
          path: ./
          target: /app/server/registry-service
        - action: rebuild
          path: ./go.mod

  registry-db:
    ports:
      - "5434:5432"
