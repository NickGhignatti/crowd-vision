services:
  tenancy-service:
    build:
      target: dev
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    develop:
      watch:
        - action: sync
          path: ./
          target: /app/server/tenancy-service
        - action: rebuild
          path: ./go.mod

  tenancy-db:
    ports:
      - "5433:5432"

  tenancy-db-adminer:
    image: adminer:latest
    environment:
      - ADMINER_DEFAULT_SERVER=tenancy-db
    depends_on:
      - tenancy-db
