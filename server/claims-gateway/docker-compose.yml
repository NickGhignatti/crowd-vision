services:
  claims-gateway:
    build:
      context: ../..
      dockerfile: server/claims-gateway/Dockerfile
    environment:
      - ADDR=:3000
      - OIDC_DISCOVERY_URL=http://keycloak:8080/realms/crowdvision
      - OIDC_ISSUER=${KEYCLOAK_PUBLIC_URL:-http://localhost:8090}/realms/crowdvision
      # cv-web, not cv-gateway: the real caller presenting ID tokens here is
      # the browser (public client, PKCE), which is what the gateway must
      # validate the token's audience against. cv-gateway (confidential,
      # direct-grant) exists only for service-level testing.
      - OIDC_CLIENT_ID=cv-web
      - TENANCY_URL=http://tenancy-service:3000
      - INTERNAL_SIGNING_SECRET=${INTERNAL_SIGNING_SECRET}
      - GATEWAY_ISSUER=cv-gateway
      # In-app password login/registration (internal/keycloakadmin): the
      # gateway holds cv-gateway's confidential client secret and calls
      # Keycloak's token/admin endpoints server-side — the browser never
      # does. Secret matches keycloak/realm-export.json's cv-gateway client.
      - KEYCLOAK_REALM=crowdvision
      - REGISTRATION_CLIENT_ID=cv-gateway
      - REGISTRATION_CLIENT_SECRET=${CV_GATEWAY_CLIENT_SECRET:-dev-only-not-for-production}
      # Stable dev signing key (generated by scripts/env/gateway-key.js) so
      # restarts don't rotate the key and invalidate every session/JWKS cache.
      - GATEWAY_PRIVATE_KEY_FILE=/run/secrets/gateway-key.pem
    volumes:
      - ../../secrets/gateway-dev-key.pem:/run/secrets/gateway-key.pem:ro
    depends_on:
      # Wait for Keycloak to be READY, not just started: claims-gateway does
      # OIDC discovery against it at boot and fail-fasts if it's unreachable
      # (and the dev Air runner won't re-run a crashed process).
      keycloak:
        condition: service_healthy
      tenancy-service:
        condition: service_started
