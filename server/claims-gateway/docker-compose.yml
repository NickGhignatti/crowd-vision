services:
  claims-gateway:
    build:
      context: ../..
      dockerfile: server/claims-gateway/Dockerfile
    environment:
      - ADDR=:3000
      - OIDC_DISCOVERY_URL=http://keycloak:8080/realms/crowdvision
      - OIDC_ISSUER=${KEYCLOAK_PUBLIC_URL:-http://localhost:8090}/realms/crowdvision
      # cv-web, not cv-gateway: the browser (public client, PKCE) presents ID tokens here,
      # so the gateway validates audience against it; cv-gateway is service-level testing only.
      - OIDC_CLIENT_ID=cv-web
      - TENANCY_URL=http://tenancy-service:3000
      - INTERNAL_SIGNING_SECRET=${INTERNAL_SIGNING_SECRET}
      - GATEWAY_ISSUER=cv-gateway
      - KEYCLOAK_REALM=crowdvision
      - REGISTRATION_CLIENT_ID=cv-gateway
      - REGISTRATION_CLIENT_SECRET=${CV_GATEWAY_CLIENT_SECRET:-dev-only-not-for-production}
      - GATEWAY_PRIVATE_KEY_FILE=/run/secrets/gateway-key.pem
    volumes:
      - ../../secrets/gateway-dev-key.pem:/run/secrets/gateway-key.pem:ro
    depends_on:
      keycloak:
        condition: service_healthy
      tenancy-service:
        condition: service_started
