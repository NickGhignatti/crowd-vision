services:
  chat-service:
    build:
      context: .
    environment:
      - MONGO_URI=mongodb://chat-db:27017/chatdb
      - GATEWAY_JWKS_URI=http://claims-gateway:3000/.well-known/jwks.json
      - GATEWAY_ISSUER=cv-gateway
      - AGENT_SERVICE_URL=http://agent-service:3000
      - HISTORY_MAX_MESSAGES=10
    depends_on:
      - chat-db

  chat-db:
    image: mongo:latest
    volumes:
      - chat-data:/data/db

volumes:
  chat-data:
