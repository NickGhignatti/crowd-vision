---
# ── Contracts Service ────────────────────────────────────────────────────────
# Axum's own route table is /health, /, /preferences/:id — no /contracts
# prefix — so the prefix must be stripped here. (The Caddyfile's comment on
# this route claims otherwise, but it actually uses handle_path, which always
# strips; the comment is stale. This route matches the real behavior.)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: contracts-service-route
  namespace: crowdvision
spec:
  parentRefs:
    - name: crowdvision-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /contracts
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: contracts-service
          port: 3000

