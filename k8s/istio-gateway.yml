# gatewayClassName: istio makes Istio auto-provision a dedicated Envoy
# gateway Deployment + Service named <name>-istio (e.g. crowdvision-gateway-istio).
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: crowdvision-gateway
  namespace: crowdvision
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: claims-gateway-route
  namespace: crowdvision
spec:
  parentRefs:
    - name: crowdvision-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /gateway
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: claims-gateway
          port: 3000
      timeouts:
        request: 30s

