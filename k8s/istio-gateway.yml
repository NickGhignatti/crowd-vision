      timeouts:
        request: 30s

---
# ── Client (Vue SPA) — catch-all root, evaluated after the specific routes ─────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: client-route
  namespace: crowdvision
spec:
  parentRefs:
    - name: crowdvision-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: client
          port: 8080
      timeouts:
        request: 30s
