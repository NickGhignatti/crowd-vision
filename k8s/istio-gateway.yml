---
# ── Socket.IO server — no rewrite, full path forwarded intact ──────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: socket-service-route
  namespace: crowdvision
spec:
  parentRefs:
    - name: crowdvision-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /socket.io
      backendRefs:
        - name: socket-service
          port: 3000
      # Deliberately no request timeout, unlike the other routes — Socket.IO
      # connections are long-lived (WebSocket upgrade, or long-polling
      # fallback), so a fixed request timeout would cut them off.

---
# ── Grafana (observability UI) — served under /grafana, no rewrite ─────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: crowdvision
spec:
  parentRefs:
    - name: crowdvision-gateway
