---
# ── Agent service ─────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agent-service-route
  namespace: crowdvision
spec:
  parentRefs:
    - name: crowdvision-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /agent
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
        - type: RequestHeaderModifier
          requestHeaderModifier:
            remove:
              - x-gateway-claims
      backendRefs:
        - name: agent-service
          port: 3000
      # Longer than the 30s baseline — LLM chat/tool-calling and embedding
      # calls can legitimately run past 30s.
      timeouts:
        request: 120s

---
# ── Chat service ──────────────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: chat-service-route
  namespace: crowdvision
spec:
  parentRefs:
    - name: crowdvision-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /chat
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: chat-service
          port: 3000
      # Matches agent-service-route's timeout — chat-service proxies every
      # message to agent-service and waits on its LLM response.
      timeouts:
        request: 120s

---
