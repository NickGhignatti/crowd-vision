---
# ── Notification service ─────────────────────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: notification-service-route
  namespace: crowdvision
spec:
  parentRefs:
    - name: crowdvision-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /notification
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
