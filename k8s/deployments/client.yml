# ── Deployment ────────────────────────────────────────────────────────────────
# The client is a pre-built static Vue SPA served by a lightweight web server.
# No init containers needed — it has no runtime dependencies.
# No secrets needed — it's all static files baked in at build time.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
  namespace: crowdvision
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client
  template:
    metadata:
      labels:
        app: client
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: client
          image: ghcr.io/nickghignatti/crowdvision-client:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          # HTTP probes are appropriate here — the static server either returns 200 or it doesn't.
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
              ephemeral-storage: "100Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
              ephemeral-storage: "500Mi"
      volumes:
        - name: tmp
          emptyDir: {}

---
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: client
  namespace: crowdvision
spec:
  selector:
    app: client
  ports:
    - port: 8080
      targetPort: 8080
