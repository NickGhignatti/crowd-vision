# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: crowdvision
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret   # credentials for ghcr.io private registry
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
            - |
              until nc -z chat-db 27017; do
                echo "waiting for chat-db..."
                sleep 2
              done
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
              ephemeral-storage: "10Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
              ephemeral-storage: "50Mi"
        # chat-service proxies every message to agent-service — wait for it so the
        # first request after a cold start doesn't fail with a 502.
        - name: wait-for-agent
          image: busybox:1.36
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
            - |
              until nc -z agent-service 3000; do
                echo "waiting for agent-service..."
                sleep 2
              done
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
              ephemeral-storage: "10Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
              ephemeral-storage: "50Mi"
      containers:
        - name: chat-service
          image: ghcr.io/nickghignatti/crowdvision-chat:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: chat-service-secret   # MONGO_URI
            - configMapRef:
                name: common-config         # PORT, CLIENT_URL, service URLs, GATEWAY_JWKS_URI, GATEWAY_ISSUER
          # Non-secret, chat-specific config not held in common-config.
          # AGENT_SERVICE_URL targets the in-cluster agent-service root (not the
          # /agent ingress prefix — service-to-service traffic skips the ingress).
          env:
            - name: AGENT_SERVICE_URL
              value: "http://agent-service:3000"
            - name: HISTORY_MAX_MESSAGES
              value: "10"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          # HTTP probe — chat-service exposes /health at its root (probes talk
          # directly to the pod, bypassing the /chat ingress prefix).
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "100Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
              ephemeral-storage: "500Mi"
      volumes:
        - name: tmp
          emptyDir: {}

---
# ── Service ───────────────────────────────────────────────────────────────────
# ClusterIP (default) — internal only. Ingress is the only external entry point.
apiVersion: v1
kind: Service
metadata:
  name: chat-service
  namespace: crowdvision
spec:
  selector:
    app: chat-service
  ports:
    - port: 3000
      targetPort: 3000
      appProtocol: http
