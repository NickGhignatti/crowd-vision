# Dedicated identity so agent-service's AuthorizationPolicy can allow chat-service by mesh principal, instead of trusting the whole namespace.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chat-service
  namespace: crowdvision

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-service
  namespace: crowdvision
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-service
  template:
    metadata:
      labels:
        app: chat-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
    spec:
      serviceAccountName: chat-service
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
            - |
              until nc -z chat-db 27017; do
                echo "waiting for chat-db..."
                sleep 2
              done
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
              ephemeral-storage: "10Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
              ephemeral-storage: "50Mi"
        - name: wait-for-agent
          image: busybox:1.36
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
            - |
              until nc -z agent-service 3000; do
                echo "waiting for agent-service..."
                sleep 2
              done
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
              ephemeral-storage: "10Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
              ephemeral-storage: "50Mi"
      containers:
        - name: chat-service
          image: ghcr.io/nickghignatti/crowdvision-chat:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: chat-service-secret
            - configMapRef:
                name: common-config
          env:
            - name: AGENT_SERVICE_URL
              value: "http://agent-service:3000"
            - name: HISTORY_MAX_MESSAGES
              value: "10"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "100Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
              ephemeral-storage: "500Mi"
      volumes:
        - name: tmp
          emptyDir: {}

---
# ClusterIP (default) — internal only. Ingress is the only external entry point.
apiVersion: v1
kind: Service
metadata:
  name: chat-service
  namespace: crowdvision
spec:
  selector:
    app: chat-service
  ports:
    - port: 3000
      targetPort: 3000
      appProtocol: http
