# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: crowdvision
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret   # credentials for ghcr.io private registry
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
            - |
              until nc -z auth-db 27017; do
                echo "waiting for auth-db..."
                sleep 2
              done
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
              ephemeral-storage: "10Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
              ephemeral-storage: "50Mi"
      containers:
        - name: auth-service
          image: ghcr.io/nickghignatti/crowdvision-auth:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: authentication-service-secret   # JWT_SECRET, INTERNAL_ADMIN_SECRET, MONGO_URI
            - configMapRef:
                name: common-config                   # PORT, CLIENT_URL, service URLs
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "100Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
              ephemeral-storage: "500Mi"
      volumes:
        - name: tmp
          emptyDir: {}

---
# ── Service ───────────────────────────────────────────────────────────────────
# ClusterIP (default) — internal only. Ingress is the only external entry point.
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: crowdvision
spec:
  selector:
    app: auth-service
  ports:
    - port: 3000
      targetPort: 3000
