# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: crowdvision
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret   # credentials for ghcr.io private registry
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z auth-db 27017; do
                echo "waiting for auth-db..."
                sleep 2
              done
      containers:
        - name: auth-service
          image: ghcr.io/nickghignatti/crowdvision-auth:latest
          imagePullPolicy: IfNotPresent   # local k3d: use imported image. VPS: change to Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: authentication-service-secret   # JWT_SECRET, INTERNAL_ADMIN_SECRET, MONGO_URI
            - configMapRef:
                name: common-config                   # PORT, CLIENT_URL, service URLs
          # Readiness: removes pod from Service endpoints until app is ready to serve.
          # Liveness:  restarts the pod if it becomes unresponsive (deadlock, hung process).
          # Using TCP probes — upgrade to httpGet /auth/health once the endpoint is stable.
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

---
# ── Service ───────────────────────────────────────────────────────────────────
# ClusterIP (default) — internal only. Ingress is the only external entry point.
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: crowdvision
spec:
  selector:
    app: auth-service
  ports:
    - port: 3000
      targetPort: 3000
