apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: crowdvision
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      initContainers:
        # Waits until auth-db is actually accepting connections
        # before the main container starts. Replaces depends_on.
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z auth-db 27017; do
                echo "waiting for auth-db..."
                sleep 2
              done
      containers:
        - name: auth-service
          image: ghcr.io/nickghignatti/crowdvision-auth:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          envFrom:
            # Injects all keys from auth-secret as env vars
            - secretRef:
                name: authentication-service-secret
            # Injects CLIENT_URL, PORT, etc. from the ConfigMap
            - configMapRef:
                name: common-config
#          readinessProbe:
#            httpGet:
#              path: /auth/health
#              port: 3000
#            initialDelaySeconds: 10
#            periodSeconds: 10
#            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
#          livenessProbe:
#            httpGet:
#              path: /auth/health
#              port: 3000
#            initialDelaySeconds: 20
#            periodSeconds: 20
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: crowdvision
spec:
  selector:
    app: auth-service           # matches the pod label above
  ports:
    - port: 3000
      targetPort: 3000
  # ClusterIP (default) — internal only, not exposed outside the cluster
  # The Ingress in Phase 5 will be the only external entry point