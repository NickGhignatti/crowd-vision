apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: crowdvision
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z notification-db 27017; do
                echo "waiting for notification-db..."
                sleep 2
              done
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do
                echo "waiting for redis..."
                sleep 2
              done
      containers:
        - name: notification-service
          image: ghcr.io/nickghignatti/crowdvision-notification:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: notification-service-secret  # MONGO_URI, VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY
            - configMapRef:
                name: common-config        # REDIS_URL, CLIENT_URL
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: crowdvision
spec:
  selector:
    app: notification-service
  ports:
    - port: 3000
      targetPort: 3000