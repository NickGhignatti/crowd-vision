# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: crowdvision
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
            - |
              until nc -z notification-db 27017; do
                echo "waiting for notification-db..."
                sleep 2
              done
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
              ephemeral-storage: "10Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
              ephemeral-storage: "50Mi"
        - name: wait-for-redis
          image: busybox:1.36
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do
                echo "waiting for redis..."
                sleep 2
              done
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
              ephemeral-storage: "10Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
              ephemeral-storage: "50Mi"
      containers:
        - name: notification-service
          image: ghcr.io/nickghignatti/crowdvision-notification:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: notification-service-secret   # MONGO_URI, VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY
            - configMapRef:
                name: common-config                 # PORT, REDIS_URL, CLIENT_URL, GATEWAY_JWKS_URI, GATEWAY_ISSUER
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "100Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
              ephemeral-storage: "500Mi"
      volumes:
        - name: tmp
          emptyDir: {}

---
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: crowdvision
spec:
  selector:
    app: notification-service
  ports:
    - port: 3000
      targetPort: 3000
