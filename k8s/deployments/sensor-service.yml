# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensor-service
  namespace: crowdvision
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sensor-service
  template:
    metadata:
      labels:
        app: sensor-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z sensor-db 27017; do
                echo "waiting for sensor-db..."
                sleep 2
              done
      containers:
        - name: sensor-service
          image: ghcr.io/nickghignatti/crowdvision-sensor:latest
          imagePullPolicy: IfNotPresent   # local k3d: use imported image. VPS: change to Always
          ports:
            - containerPort: 3000
          envFrom:
            # MONGO_URI moved from a hardcoded inline env var to a proper secret.
            - secretRef:
                name: sensor-service-secret   # MONGO_URI
            - configMapRef:
                name: common-config           # PORT, REDIS_URL, TWIN_SERVICE_URL
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

---
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: sensor-service
  namespace: crowdvision
spec:
  selector:
    app: sensor-service
  ports:
    - port: 3000
      targetPort: 3000
