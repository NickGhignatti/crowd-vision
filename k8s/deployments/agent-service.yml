apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
  namespace: crowdvision
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-service
  template:
    metadata:
      labels:
        app: agent-service
    spec:
      initContainers:
        # Agent calls twin-service and auth-service internally
        # wait until both are reachable before starting
        - name: wait-for-twin
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z twin-service 3000; do
                echo "waiting for twin-service..."
                sleep 2
              done
        - name: wait-for-auth
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z auth-service 3000; do
                echo "waiting for auth-service..."
                sleep 2
              done
      containers:
        - name: agent-service
          image: ghcr.io/nickghignatti/crowdvision-agent:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: agent-service-secret      # GOOGLE_API_KEY, DEEPSEEK_API_KEY
            - configMapRef:
                name: common-config     # TWIN_SERVICE_URL, AUTH_SERVICE_URL
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: agent-service
  namespace: crowdvision
spec:
  selector:
    app: agent-service
  ports:
    - port: 3000
      targetPort: 3000