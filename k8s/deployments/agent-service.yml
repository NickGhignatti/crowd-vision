apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
  namespace: crowdvision
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-service
  template:
    metadata:
      labels:
        app: agent-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        # agent-service runs Alembic migrations on startup — DB must be ready first.
        - name: wait-for-db
          image: busybox:1.36
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
            - |
              until nc -z agent-db 5432; do
                echo "waiting for agent-db..."
                sleep 2
              done
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
              ephemeral-storage: "10Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
              ephemeral-storage: "50Mi"
        # agent-service calls twin-service internally (the RAG twin tool).
        - name: wait-for-twin
          image: busybox:1.36
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
            - |
              until nc -z twin-service 3000; do
                echo "waiting for twin-service..."
                sleep 2
              done
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
              ephemeral-storage: "10Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
              ephemeral-storage: "50Mi"
      containers:
        - name: agent-service
          image: ghcr.io/nickghignatti/crowdvision-agent:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: agent-service-secret
            - configMapRef:
                name: common-config
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
              ephemeral-storage: "100Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
              ephemeral-storage: "500Mi"
      volumes:
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: agent-service
  namespace: crowdvision
spec:
  selector:
    app: agent-service
  ports:
    - port: 3000
      targetPort: 3000
      appProtocol: http
