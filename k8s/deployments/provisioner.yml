apiVersion: apps/v1
kind: Deployment
metadata:
  name: provisioner
  namespace: crowdvision
spec:
  replicas: 1
  selector:
    matchLabels:
      app: provisioner
  template:
    metadata:
      labels:
        app: provisioner
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: wait-for-registry
          image: busybox:1.36
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
            - |
              until nc -z registry-service 3000; do
                echo "waiting for registry-service..."
                sleep 2
              done
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
              ephemeral-storage: "10Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
              ephemeral-storage: "50Mi"
        - name: wait-for-tenancy
          image: busybox:1.36
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
            - |
              until nc -z tenancy-service 3000; do
                echo "waiting for tenancy-service..."
                sleep 2
              done
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
              ephemeral-storage: "10Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
              ephemeral-storage: "50Mi"
      containers:
        - name: provisioner
          image: ghcr.io/nickghignatti/crowdvision-provisioner:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 3000
          env:
            - name: REGISTRY_URL
              value: "http://registry-service:3000"
            - name: TENANCY_URL
              value: "http://tenancy-service:3000"
          envFrom:
            - secretRef:
                name: provisioner-secret
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
              ephemeral-storage: "100Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
              ephemeral-storage: "500Mi"
      volumes:
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: provisioner
  namespace: crowdvision
spec:
  selector:
    app: provisioner
  ports:
    - port: 3000
      targetPort: 3000
      appProtocol: http
