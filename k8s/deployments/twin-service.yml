# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: twin-service
  namespace: crowdvision
spec:
  replicas: 1
  selector:
    matchLabels:
      app: twin-service
  template:
    metadata:
      labels:
        app: twin-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z twin-db 27017; do
                echo "waiting for twin-db..."
                sleep 2
              done
      containers:
        - name: twin-service
          image: ghcr.io/nickghignatti/crowdvision-twin:latest
          imagePullPolicy: IfNotPresent   # local k3d: use imported image. VPS: change to Always
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: twin-service-secret   # MONGO_URI
            - configMapRef:
                name: common-config         # PORT, CLIENT_URL, SENSOR_SERVICE_URL
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

---
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: twin-service
  namespace: crowdvision
spec:
  selector:
    app: twin-service
  ports:
    - port: 3000
      targetPort: 3000
