# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: contracts-service
  namespace: crowdvision
spec:
  replicas: 1
  selector:
    matchLabels:
      app: contracts-service
  template:
    metadata:
      labels:
        app: contracts-service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do
                echo "waiting for redis..."
                sleep 2
              done
        - name: wait-for-sensor
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z sensor-service 3000; do
                echo "waiting for sensor-service..."
                sleep 2
              done
        - name: wait-for-twin
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z twin-service 3000; do
                echo "waiting for twin-service..."
                sleep 2
              done
      containers:
        - name: contracts-service
          image: ghcr.io/nickghignatti/crowdvision-contracts:latest
          imagePullPolicy: IfNotPresent   # local k3d: use imported image. VPS: change to Always
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: common-config   # PORT, REDIS_URL
          env:
            # contracts-service uses these names instead of the ConfigMap keys.
            # Inline here to avoid adding contracts-specific vars to the shared ConfigMap.
            - name: SENSOR_METRICS_URL
              value: "http://sensor-service:3000"
            - name: TWIN_METRICS_URL
              value: "http://twin-service:3000"
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

---
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: contracts-service
  namespace: crowdvision
spec:
  selector:
    app: contracts-service
  ports:
    - port: 3000
      targetPort: 3000
