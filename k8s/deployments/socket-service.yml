# ── Deployment ────────────────────────────────────────────────────────────────
# Socket.IO connections are stateful — a client handshakes with a specific pod.
# With 1 replica this is not an issue. If you scale to multiple replicas:
#   1. Session/cookie affinity at the gateway is NOT configured today — the
#      socket-service-route HTTPRoute (k8s/istio-gateway.yml) has no session
#      affinity, so a reconnect can land on a different pod. Add a Gateway API
#      session-persistence policy (or Istio's consistent-hash load balancing)
#      before scaling past 1 replica.
#   2. The Redis adapter broadcasts events across replicas via pub/sub.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: socket-service
  namespace: crowdvision
spec:
  replicas: 1
  selector:
    matchLabels:
      app: socket-service
  template:
    metadata:
      labels:
        app: socket-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379; do
                echo "waiting for redis..."
                sleep 2
              done
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
              ephemeral-storage: "10Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
              ephemeral-storage: "50Mi"
      containers:
        - name: socket-service
          image: ghcr.io/nickghignatti/crowdvision-socket:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: common-config # PORT, REDIS_URL, CLIENT_URL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "100Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
              ephemeral-storage: "500Mi"
      volumes:
        - name: tmp
          emptyDir: {}

---
# ── Service ───────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: socket-service
  namespace: crowdvision
spec:
  selector:
    app: socket-service
  ports:
    - port: 3000
      targetPort: 3000
      appProtocol: http
