# ── Headless Service ──────────────────────────────────────────────────────────
# clusterIP: None makes this headless — DNS resolves directly to the pod IP
# instead of a virtual load-balancer IP. Required for stable StatefulSet DNS:
#   auth-db-0.auth-db.crowdvision.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: auth-db
  namespace: crowdvision
spec:
  clusterIP: None
  selector:
    app: auth-db
  ports:
    - port: 27017
      targetPort: 27017

---
# ── StatefulSet ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: auth-db
  namespace: crowdvision
spec:
  serviceName: auth-db    # must match the headless Service name above
  replicas: 1
  selector:
    matchLabels:
      app: auth-db
  template:
    metadata:
      labels:
        app: auth-db
    spec:
      containers:
        - name: mongodb
          image: mongo:8   # pinned to major version — avoids silent breaking upgrades
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: auth-data
              mountPath: /data/db   # standard MongoDB data directory
          readinessProbe:
            exec:
              command: [mongosh, --eval, "db.adminCommand('ping')"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: [mongosh, --eval, "db.adminCommand('ping')"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

  # One PVC is created per pod: auth-data-auth-db-0
  # The PVC survives pod deletion — data persists across restarts and rescheduling.
  volumeClaimTemplates:
    - metadata:
        name: auth-data
      spec:
        accessModes: ["ReadWriteOnce"]   # one node at a time — correct for single MongoDB
        resources:
          requests:
            storage: 1Gi
        # Local k3d:           omit storageClassName — uses default "local-path"
        # Hetzner VPS:         storageClassName: hcloud-volumes
        # DigitalOcean VPS:    storageClassName: do-block-storage
