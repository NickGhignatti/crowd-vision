# ── Headless Service ──────────────────────────────────────────────────────────
# clusterIP: None makes this headless — DNS resolves directly to the pod IP
# instead of a virtual load-balancer IP. Required for stable StatefulSet DNS:
#   chat-db-0.chat-db.crowdvision.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: chat-db
  namespace: crowdvision
spec:
  clusterIP: None
  selector:
    app: chat-db
  ports:
    - port: 27017
      targetPort: 27017
      appProtocol: tcp

---
# ── StatefulSet ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: chat-db
  namespace: crowdvision
spec:
  serviceName: chat-db    # must match the headless Service name above
  replicas: 1
  selector:
    matchLabels:
      app: chat-db
  template:
    metadata:
      labels:
        app: chat-db
    spec:
      containers:
        - name: mongodb
          image: mongo:8   # pinned to major version — avoids silent breaking upgrades
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: chat-data
              mountPath: /data/db   # standard MongoDB data directory
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            exec:
              command: [mongosh, --eval, "db.adminCommand('ping')"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: [mongosh, --eval, "db.adminCommand('ping')"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
              ephemeral-storage: "100Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
              ephemeral-storage: "500Mi"
      volumes:
        - name: tmp
          emptyDir: {}

  # One PVC is created per pod: chat-data-chat-db-0
  # The PVC survives pod deletion — data persists across restarts and rescheduling.
  volumeClaimTemplates:
    - metadata:
        name: chat-data
      spec:
        accessModes: ["ReadWriteOnce"]   # one node at a time — correct for single MongoDB
        resources:
          requests:
            storage: 1Gi
        # Local k3d:           omit storageClassName — uses default "local-path"
        # Hetzner VPS:         storageClassName: hcloud-volumes
        # DigitalOcean VPS:    storageClassName: do-block-storage
