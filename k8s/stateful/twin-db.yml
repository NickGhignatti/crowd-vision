apiVersion: v1
kind: Service
metadata:
  name: twin-db
  namespace: crowdvision
  labels:
    app: twin-db
spec:
  clusterIP: None
  selector:
    app: twin-db
  ports:
    - port: 27017
      targetPort: 27017

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: twin-db
  namespace: crowdvision
spec:
  serviceName: twin-db
  replicas: 1
  selector:
    matchLabels:
      app: twin-db
  template:
    metadata:
      labels:
        app: twin-db
    spec:
      containers:
        - name: mongodb
          image: mongo:latest
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: twin-data
              mountPath: /data/db
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
  volumeClaimTemplates:
    - metadata:
        name: twin-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi