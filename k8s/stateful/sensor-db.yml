apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sensor-db
  namespace: crowdvision
spec:
  serviceName: "sensor-db"
  replicas: 1
  selector:
    matchLabels:
      app: sensor-db
  template:
    metadata:
      labels:
        app: sensor-db
    spec:
      containers:
        - name: mongo
          image: mongo:latest
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: sensor-data
              mountPath: /data/db
  volumeClaimTemplates:
    - metadata:
        name: sensor-data
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: sensor-db
  namespace: crowdvision
spec:
  selector:
    app: sensor-db
  ports:
    - port: 27017
      targetPort: 27017