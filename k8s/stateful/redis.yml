# Redis gets a normal ClusterIP Service (not headless)
# because app services just need one stable endpoint to connect to
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: crowdvision
  labels:
    app: redis
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
  # No clusterIP: None here — this is a normal Service with a virtual IP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: crowdvision
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:alpine
          ports:
            - containerPort: 6379
          # Redis has a built-in ping command — ideal for probes
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"