# ── Service ───────────────────────────────────────────────────────────────────
# Regular ClusterIP Service (not headless) — services connect to the stable
# virtual IP at redis:6379. Per-pod addressing is not needed for Redis.
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: crowdvision
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

---
# ── StatefulSet ───────────────────────────────────────────────────────────────
# Changed from Deployment to StatefulSet so that:
#   1. Redis gets a stable pod name (redis-0) and a dedicated PVC.
#   2. Data survives pod rescheduling — Socket.IO room state and any queues
#      are not silently lost when the node is drained or updated.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: crowdvision
spec:
  serviceName: redis   # governing Service — must exist, does not need to be headless
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine   # pinned to major version
          # --appendonly yes enables AOF persistence: every write is logged to disk
          # so Redis can replay state after a restart with zero data loss.
          command: [redis-server, --appendonly, "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: redis-data
              mountPath: /data   # Redis writes AOF and RDB files here
          readinessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 512Mi   # pub/sub state and AOF log are small
        # Local k3d:           omit storageClassName — uses default "local-path"
        # Hetzner VPS:         storageClassName: hcloud-volumes
        # DigitalOcean VPS:    storageClassName: do-block-storage
