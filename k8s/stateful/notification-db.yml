# ── Headless Service ──────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: notification-db
  namespace: crowdvision
spec:
  clusterIP: None
  selector:
    app: notification-db
  ports:
    - port: 27017
      targetPort: 27017
      appProtocol: tcp

---
# ── StatefulSet ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: notification-db
  namespace: crowdvision
spec:
  serviceName: notification-db
  replicas: 1
  selector:
    matchLabels:
      app: notification-db
  template:
    metadata:
      labels:
        app: notification-db
    spec:
      containers:
        - name: mongodb
          image: mongo:8
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: notification-data
              mountPath: /data/db
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            exec:
              command: [mongosh, --eval, "db.adminCommand('ping')"]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: [mongosh, --eval, "db.adminCommand('ping')"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
              ephemeral-storage: "100Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
              ephemeral-storage: "500Mi"
      volumes:
        - name: tmp
          emptyDir: {}

  volumeClaimTemplates:
    - metadata:
        name: notification-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
        # storageClassName: omit for local k3d (default "local-path"); set to
        # hcloud-volumes (Hetzner) or do-block-storage (DigitalOcean) in prod.
