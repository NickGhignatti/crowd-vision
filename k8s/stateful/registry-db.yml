apiVersion: v1
kind: Service
metadata:
  name: registry-db
  namespace: crowdvision
spec:
  clusterIP: None
  selector:
    app: registry-db
  ports:
    - port: 5432
      targetPort: 5432
      appProtocol: tcp

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: registry-db
  namespace: crowdvision
spec:
  serviceName: registry-db
  replicas: 1
  selector:
    matchLabels:
      app: registry-db
  template:
    metadata:
      labels:
        app: registry-db
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          envFrom:
            - secretRef:
                name: registry-db-secret
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: registry-data
              mountPath: /var/lib/postgresql/data
            - name: run
              mountPath: /var/run/postgresql
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            exec:
              command: [pg_isready, -U, registry]
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: [pg_isready, -U, registry]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
              ephemeral-storage: "100Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
              ephemeral-storage: "500Mi"
      volumes:
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}

  volumeClaimTemplates:
    - metadata:
        name: registry-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
