# Restricts agent-service to the ingress gateway + chat-service, since it
# trusts the unsigned x-gateway-claims header (app/auth.py) without a signature check.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: agent-service-callers
  namespace: crowdvision
spec:
  selector:
    matchLabels:
      app: agent-service
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - cluster.local/ns/crowdvision/sa/crowdvision-gateway-istio
    - from:
        - source:
            principals:
              - cluster.local/ns/crowdvision/sa/chat-service
