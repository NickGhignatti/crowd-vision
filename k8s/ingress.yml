apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crowdvision-ingress
  namespace: crowdvision
  annotations:
    # 1. Enable Regex matching
    nginx.ingress.kubernetes.io/use-regex: "true"
    # 2. Chop off the prefix (the first part of the path) and keep the rest ($2)
    nginx.ingress.kubernetes.io/rewrite-target: /$2

    # Proxy timeouts for Socket.IO
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # ─── Auth service ─────────────────────────────────────────────
          - path: /auth(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-service
                port:
                  number: 3000

          # ─── Digital twin service ──────────────────────────────────────
          - path: /twin(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: twin-service
                port:
                  number: 3000

          # ─── Notification service ──────────────────────────────────────
          - path: /notification(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: notification-service
                port:
                  number: 3000

          # ─── Agent service ─────────────────────────────────────────────
          - path: /agent(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: agent-service
                port:
                  number: 3000

          # ─── Socket.IO ─────────────────────────────────────────────────
          - path: /socket.io(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: socket-service
                port:
                  number: 3000

          # ─── Vue client (catch-all, must be last) ──────────────────────
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: client
                port:
                  number: 8080