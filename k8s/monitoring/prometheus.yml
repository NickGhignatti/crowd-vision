apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: crowdvision

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, nodes/metrics, services, endpoints, pods]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get]
  - nonResourceURLs: [/metrics, /metrics/cadvisor]
    verbs: [get]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: crowdvision

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: crowdvision
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - alert.rules.yml   # the sibling key below; the whole ConfigMap is mounted as one directory

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: [localhost:9090]
      - job_name: istiod
        static_configs:
          - targets: [istiod.istio-system:15014]
      - job_name: istio-ztunnel
        metrics_path: /stats/prometheus
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [istio-system]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            action: keep
            regex: ztunnel
          - source_labels: [__address__]
            action: replace
            regex: ([^:]+)(?::\d+)?
            replacement: $1:15020
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
      - job_name: istio-ingress-gateway
        metrics_path: /stats/prometheus
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [crowdvision]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_gateway_networking_k8s_io_gateway_name]
            action: keep
            regex: crowdvision-gateway
          - source_labels: [__address__]
            action: replace
            regex: ([^:]+)(?::\d+)?
            replacement: $1:15090
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod
      - job_name: kubernetes-cadvisor
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true   # needed for k3d self-signed certs
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor

      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: [crowdvision]
        relabel_configs:
          # Only keep pods that explicitly opt in
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
            replacement: $1
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod

  # Mirrors repo-root prometheus.rules.yml (docker-compose stack) — keep both in sync.
  # No label filters: each metric name is emitted by only one service, so the name alone scopes it.
  alert.rules.yml: |
    groups:
      - name: crowdvision-alerts
        rules:
          - alert: ServiceDown
            expr: up == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Scrape target down ({{ $labels.job }})"
              description: "Prometheus has failed to scrape {{ $labels.job }} (instance {{ $labels.instance }}) for the last 2 minutes."

          - alert: TwinServiceHighErrorRate
            expr: (sum(rate(http_error_requests_total[5m])) / sum(rate(http_requests_total[5m]))) > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "twin-service HTTP error rate above 5%"
              description: "{{ $value | humanizePercentage }} of twin-service requests have errored over the last 5 minutes."

          - alert: ChatServiceHighErrorRate
            expr: (sum(rate(chat_http_error_requests_total[5m])) / sum(rate(chat_http_requests_total[5m]))) > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "chat-service HTTP error rate above 5%"
              description: "{{ $value | humanizePercentage }} of chat-service requests have errored over the last 5 minutes."

          - alert: TwinServiceHighLatency
            expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "twin-service p95 latency above 1s"
              description: "twin-service's 95th percentile request duration has been above 1 second for 5 minutes."

          - alert: ChatServiceHighLatency
            expr: histogram_quantile(0.95, sum(rate(chat_http_request_duration_seconds_bucket[5m])) by (le)) > 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "chat-service p95 latency above 1s"
              description: "chat-service's 95th percentile request duration has been above 1 second for 5 minutes."

          - alert: ContractsServiceFanoutLatencyHigh
            expr: histogram_quantile(0.95, sum(rate(telemetry_fanout_latency_ms_bucket[5m])) by (le)) > 500
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "contracts-service fan-out latency above 500ms"
              description: "contracts-service's 95th percentile sensor-ingestion-to-fan-out latency has been above 500ms for 5 minutes."

          - alert: NodeEventLoopLagHigh
            expr: nodejs_eventloop_lag_seconds > 0.1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Node.js event loop lag above 100ms ({{ $labels.job }})"
              description: "{{ $labels.job }}'s Node.js event loop has been lagging by more than 100ms for 5 minutes, indicating the process is struggling to keep up."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: crowdvision
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v3
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=15d
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: prometheus-data
              mountPath: /prometheus
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
              ephemeral-storage: "100Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
              ephemeral-storage: "500Mi"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: prometheus-data
          persistentVolumeClaim:
            claimName: prometheus-data
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: crowdvision
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
  # storageClassName by target — k3d: omit (default local-path); Hetzner: hcloud-volumes;
  # DigitalOcean: do-block-storage.

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: crowdvision
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
