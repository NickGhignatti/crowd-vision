apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: crowdvision
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
  # storageClassName by target — k3d: omit (default local-path); Hetzner: hcloud-volumes;
  # DigitalOcean: do-block-storage.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: crowdvision
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      imagePullSecrets: []
      containers:
        - name: grafana
          image: grafana/grafana:11.0.0
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: grafana-secret
          env:
            - name: GF_SERVER_ROOT_URL
              value: "http://crowdvision.local/grafana"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            - name: GF_DATASOURCES_DEFAULT_NAME
              value: Prometheus
            - name: GF_DATASOURCES_DEFAULT_TYPE
              value: prometheus
            - name: GF_DATASOURCES_DEFAULT_URL
              value: http://prometheus:9090
            - name: GF_DATASOURCES_DEFAULT_IS_DEFAULT
              value: "true"
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /grafana/api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /grafana/api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "100Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
              ephemeral-storage: "500Mi"
      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: crowdvision
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
