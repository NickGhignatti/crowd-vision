# Verifies the claims-gateway-minted JWT ONCE at the Istio ingress gateway.
# outputPayloadToHeader injects the full validated claims payload (same JSON
# shape claims-gateway signs) as one base64 header, x-gateway-claims — every
# downstream service decodes this instead of doing its own JWT verification.
apiVersion: security.istio.io/v1
kind: RequestAuthentication
metadata:
  name: gateway-jwt
  namespace: crowdvision
spec:
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: crowdvision-gateway
  jwtRules:
    - issuer: cv-gateway
      # jwksUri deliberately goes THROUGH the ingress gateway's own /gateway/* route cause
      # inside the cluster plaintext messages are blocked by default
      jwksUri: http://crowdvision-gateway-istio.crowdvision.svc.cluster.local/gateway/.well-known/jwks.json
      fromHeaders:
        - name: Authorization
          prefix: "Bearer "
      fromCookies:
        - authentication_token
      forwardOriginalToken: false
      outputPayloadToHeader: x-gateway-claims

---
# Once ANY AuthorizationPolicy selects a workload, Istio flips that workload
# to default-deny for everything not explicitly matched. So this needs two
# rules, not one: rule 1 allows every path EXCEPT the protected ones with no
# principal required (claims-gateway self-manages its own auth; contracts and
# the client SPA never had per-request JWT auth and the SPA needs unauthenticated
# access to serve its shell before login); rule 2 allows the protected paths
# only with a JWT principal verified by the RequestAuthentication above.
#
# /agent/* is deliberately NOT gated here (same as its Caddyfile route):
# agent-service also serves evals/run_evals.py's local-dev HS256 bypass,
# which doesn't hold a real gateway JWT to present at the edge — it keeps
# doing its own auth in-process (see app/auth.py's require_user), checking
# for a mesh claims header first and falling back to the eval token.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: require-gateway-jwt
  namespace: crowdvision
spec:
  selector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: crowdvision-gateway
  action: ALLOW
  rules:
    - to:
        - operation:
            paths: ["/*"]
            notPaths:
              - /twin/*
              - /sensor/*
              - /notification/*
              - /chat/*
              - /socket.io/*
              - /tenancy/*
    # Telemetry ingestion is device/simulator-facing and carries no user token —
    # sensor-service leaves POST /ingest unauthenticated (see its router.ts), so
    # allow it with no principal. Everything else under /sensor/* still needs a
    # JWT (rule below). Mirrors the /sensor/ingest carve-out in the Caddyfile.
    - to:
        - operation:
            paths:
              - /sensor/ingest
    - from:
        - source:
            requestPrincipals: ["cv-gateway/*"]
      to:
        - operation:
            paths:
              - /twin/*
              - /sensor/*
              - /notification/*
              - /chat/*
              - /socket.io/*
              - /tenancy/*
