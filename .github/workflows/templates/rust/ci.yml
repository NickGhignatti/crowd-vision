name: Rust CI Template
on:
  workflow_call:
    inputs:
      service_key: { required: true, type: string }
      working_directory: { required: true, type: string }
      needs_mongo: { required: false, type: boolean, default: false }

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      CARGO_INCREMENTAL: "0"
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Start Mongo
        if: ${{ inputs.needs_mongo }}
        uses: ./.github/actions/setup-mongo

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          working_directory: ${{ inputs.working_directory }}
          service_key: ${{ inputs.service_key }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run Standard Tests
        run: cargo test

      - name: Build Release Binary
        run: cargo build --release

      # The compiled binary is named after the crate (server/twin-service ->
      # "twin-service"), not the short service_key used for the artifact name.
      - name: Locate Release Binary
        id: bin
        run: echo "name=$(basename '${{ inputs.working_directory }}')" >> "$GITHUB_OUTPUT"

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: binary-${{ inputs.service_key }}
          path: ${{ inputs.working_directory }}/target/release/${{ steps.bin.outputs.name }}
          retention-days: 1
