name: Go CI Template
on:
  workflow_call:
    inputs:
      service_key:
        required: true
        type: string
      working_directory:
        required: true
        type: string
      # auth-contracts/auth-middleware/auth-policy are libraries with no cmd/
      # package — there's nothing to build a binary or Docker image from.
      builds_binary:
        required: false
        type: boolean
        default: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Setup Environment
        uses: ./.github/actions/setup-go
        with:
          working_directory: ${{ inputs.working_directory }}

      - name: Run go vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

      - name: Build Binary
        if: inputs.builds_binary
        run: go build -o app-binary ./cmd/...

      - name: Upload Binary Artifact
        if: inputs.builds_binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: binary-${{ inputs.service_key }}
          path: ${{ inputs.working_directory }}/app-binary
          retention-days: 1
