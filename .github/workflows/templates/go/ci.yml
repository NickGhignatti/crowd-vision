name: Go CI Template
on:
  workflow_call:
    inputs:
      working_directory:
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e
        with:
          go-version: '1.25.5'
          cache: true
          cache-dependency-path: 'server/**/go.sum' # global cache

      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...
