name: CD Documentation

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "documentation/**"

permissions:
  contents: write

concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  build-documentation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.x

      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV

      - uses: quarkdown-labs/setup-quarkdown@7f1c7a66fd944e1717778356590e57469a525ca4

      - name: Build user docs
        run: quarkdown c documentation/user/main.qd --out landing-page/user

      - name: Build dev docs
        run: quarkdown c documentation/developer/main.qd --out landing-page/dev

      - name: Build SPE report
        run: quarkdown c documentation/reports/spe/main.qd --out landing-page/reports

      - name: Build ASW report
        run: quarkdown c documentation/reports/asw/main.qd --out landing-page/reports --allow global-read

      - name: Build report PDFs
        run: |
          quarkdown c documentation/reports/spe/main.qd --out landing-page/reports --pdf --pdf-no-sandbox --timeout 120
          quarkdown c documentation/reports/asw/main.qd --out landing-page/reports --pdf --pdf-no-sandbox --timeout 120 --allow global-read

      - name: Deploy to GitHub Pages (preview)
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./landing-page
          destination_dir: preview
