name: contracts-service-ci

on:
  workflow_call:

jobs:
  contracts-service:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./server/contracts-service

    env:
      # Skip debug symbols (never used in CI) and incremental compilation
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      CARGO_INCREMENTAL: "0"
      # Link with mold
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1
        with:
          toolchain: stable
          components: rustfmt, clippy, llvm-tools-preview

      # Caches the cargo registry + target/ so dependency crates aren't recompiled
      # on every run. `workspaces` must point at the crate dir — `uses:` steps do
      # not honor the job's `working-directory` default.
      - name: Cache cargo registry + build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: server/contracts-service

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy -- -D warnings

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Run tests with coverage
        run: cargo llvm-cov --json --summary-only --output-path coverage.json

      - name: Coverage summary
        if: always()
        run: |
          {
            echo "| Service | Lines | Branches | Functions |"
            echo "| --- | --- | --- | --- |"
            jq -r '.data[0].totals as $t | "| **contracts-service** | \(($t.lines.percent*100|round)/100)% | \(($t.branches.percent*100|round)/100)% | \(($t.functions.percent*100|round)/100)% |"' coverage.json
          } >> "$GITHUB_STEP_SUMMARY" || true

      - name: 🔒 Security audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: server/contracts-service
