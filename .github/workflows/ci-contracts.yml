name: contracts-service-ci

on:
  workflow_call:

jobs:
  contracts-service:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./server/contracts-service

    env:
      # Skip debug symbols (never used in CI) and incremental compilation
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      CARGO_INCREMENTAL: "0"
      # Link with mold
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable
          components: rustfmt, clippy, llvm-tools-preview

      - name: 🎨 Check formatting
        run: cargo fmt --check

      - name: 📎 Run Clippy
        run: cargo clippy -- -D warnings

      # Compiled from source to avoid pinning a third-party install action.
      # Swap for taiki-e/install-action@<sha> (tool: cargo-llvm-cov) for a faster prebuilt binary.
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: 🧪 Run tests with coverage
        run: cargo llvm-cov --json --summary-only --output-path coverage.json

      - name: Coverage summary
        if: always()
        run: |
          {
            echo "| Service | Lines | Branches | Functions |"
            echo "| --- | --- | --- | --- |"
            jq -r '.data[0].totals as $t | "| **contracts-service** | \(($t.lines.percent*100|round)/100)% | \(($t.branches.percent*100|round)/100)% | \(($t.functions.percent*100|round)/100)% |"' coverage.json
          } >> "$GITHUB_STEP_SUMMARY" || true

      - name: 🔒 Security audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: server/contracts-service
