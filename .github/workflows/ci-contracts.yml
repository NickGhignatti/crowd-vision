name: contracts-service-ci

on:
  pull_request:
    branches: [master]
    paths:
      - "server/contracts-service/**"
      - ".github/workflows/ci-contracts.yml"
  workflow_call:

jobs:
  contracts-service:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./server/contracts-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: 🎨 Check formatting
        run: cargo fmt --check

      - name: 📎 Run Clippy
        run: cargo clippy -- -D warnings

      - name: 🏗️ Build
        run: cargo build

      - name: 🧪 Run tests
        run: cargo test

      - name: 🔒 Security audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: server/contracts-service
