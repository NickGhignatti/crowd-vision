name: twin-service-ci

on:
  workflow_call:

jobs:
  twin-service:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./server/twin-service

    env:
      # Skip debug symbols (never used in CI) and incremental compilation
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      CARGO_INCREMENTAL: "0"
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
      MONGO_URI: "mongodb://localhost:27017"

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6
        with:
          toolchain: stable
          components: rustfmt, clippy, llvm-tools-preview

      - name: Cache cargo registry + build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4
        with:
          workspaces: server/twin-service

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Run tests with coverage
        run: cargo llvm-cov --all-targets --json --summary-only --output-path coverage.json

      - name: Coverage summary
        if: always()
        run: |
          {
            echo "| Service | Lines | Branches | Functions |"
            echo "| --- | --- | --- | --- |"
            jq -r '.data[0].totals as $t | "| **twin-service** | \(($t.lines.percent*100|round)/100)% | \(($t.branches.percent*100|round)/100)% | \(($t.functions.percent*100|round)/100)% |"' coverage.json
          } >> "$GITHUB_STEP_SUMMARY" || true

      - name: Security audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: server/twin-service
