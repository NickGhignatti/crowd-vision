name: twin-service-ci

on:
  workflow_call:

jobs:
  twin-service:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./server/twin-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: |
            server/twin-service/package-lock.json
            tooling/eslint-config/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      # The shared @crowdvision/eslint-config is a file: dependency; its own
      # deps (@eslint/js, typescript-eslint, …) only resolve when installed
      # next to its index.mjs, so install them in-place before linting.
      - name: 🔧 Install shared ESLint config
        working-directory: tooling/eslint-config
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint

      - name: 🏗️ Build
        run: npm run build

      - name: 🧪 Run Server Tests
        run: npm run test

      - name: 🔒 Audit dependencies
        run: npm audit --audit-level=high --omit=dev
