name: Security Audit

on:
  pull_request:
  workflow_call:

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory:
          - "."
          - "client"
          - "server/auth-service"
          - "server/notification-service"
          - "server/sensor-service"
          - "server/socket-service"
          - "server/twin-service"
          - "server/agent-service"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Audit Dependencies
        run: cd ${{ matrix.directory }} && npm audit --audit-level=high --omit=dev

  python-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: 🔒 Audit agent-service dependencies
        working-directory: ./server/agent-service
        run: uv audit

  rust-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: 🔒 Audit contracts-service dependencies
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: ./server/contracts-service
