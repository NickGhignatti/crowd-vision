name: CD Registry

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Image(s) to build: 'all' or comma-separated (e.g. crowdvision-twin,crowdvision-client)"
        required: false
        default: "all"
  push:
    branches: ["master"]
    paths:
      - "server/**"
      - "simulators/**"
      - "client/**"
      - ".github/services.json"
      - ".github/workflows/cd-registry.yml"

env:
  REGISTRY: ghcr.io

concurrency:
  group: registry-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      any: ${{ steps.set.outputs.any }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Detect changed services
        if: github.event_name == 'push'
        id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590
        with:
          filters: |
            crowdvision-chat: 'server/chat-service/**'
            crowdvision-twin: 'server/twin-service/**'
            crowdvision-notification: 'server/notification-service/**'
            crowdvision-socket: 'server/socket-service/**'
            crowdvision-agent: 'server/agent-service/**'
            crowdvision-sensor: 'server/sensor-service/**'
            crowdvision-contracts: 'server/contracts-service/**'
            crowdvision-simulator: 'simulators/sensor-simulator/**'
            crowdvision-aq-simulator: 'simulators/aq-simulator/**'
            crowdvision-client: 'client/**'
            crowdvision-claims-gateway: 'server/claims-gateway/**'
            crowdvision-provisioner: 'server/provisioner/**'
            crowdvision-registry: 'server/registry-service/**'
            crowdvision-tenancy: 'server/tenancy-service/**'
            workflow:
              - '.github/services.json'
              - '.github/workflows/cd-registry.yml'

      - name: Build matrix
        id: set
        env:
          EVENT: ${{ github.event_name }}
          INPUT: ${{ github.event.inputs.service }}
          CHANGED: ${{ steps.filter.outputs.changes }}
        run: |
          # Image/context/Dockerfile metadata lives in .github/services.json, the
          # single source of truth also used by ci-gate.yml, cd-coverage.yml, and
          # maint-cleanup.yml — see that file before editing this logic.
          REGISTRY=$(jq -c '[.[] | select(.image) | {
            image: .image,
            context: (.cd_context // ("./" + .dir)),
            dockerfile: (.dockerfile // ((.cd_context // ("./" + .dir)) + "/Dockerfile"))
          }] | INDEX(.image)' .github/services.json)

          if [ "$EVENT" = "workflow_dispatch" ]; then
            if [ -z "$INPUT" ] || [ "$INPUT" = "all" ]; then
              SELECTED=$(echo "$REGISTRY" | jq -c 'keys')
            else
              SELECTED=$(echo "$INPUT" | jq -Rc 'split(",") | map(gsub("^\\s+|\\s+$";""))')
            fi
          else
            # push: the 'workflow' filter means cd-registry.yml or services.json itself changed -> rebuild all
            if echo "$CHANGED" | jq -e 'index("workflow")' >/dev/null; then
              SELECTED=$(echo "$REGISTRY" | jq -c 'keys')
            else
              SELECTED=$(echo "$CHANGED" | jq -c 'map(select(. != "workflow"))')
            fi
          fi

          MATRIX=$(jq -nc --argjson reg "$REGISTRY" --argjson sel "$SELECTED" \
            '{include: ($sel | map(select($reg[.] != null) | {image: ., context: $reg[.].context, dockerfile: $reg[.].dockerfile}))}')
          if [ "$(echo "$MATRIX" | jq '.include | length')" -gt 0 ]; then ANY=true; else ANY=false; fi

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "any=$ANY" >> "$GITHUB_OUTPUT"
          echo "Selected images: $MATRIX"

  build-and-push:
    needs: changes
    if: ${{ needs.changes.outputs.any == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: read
      security-events: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.changes.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Set lowercase image prefix
        run: |
          OWNER_LOWERCASE=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_PREFIX=ghcr.io/$OWNER_LOWERCASE" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Client Build Args
        if: matrix.image == 'crowdvision-client'
        run: echo "BUILD_ARGS=VITE_VAPID_PUBLIC_KEY=${{ secrets.VITE_VAPID_PUBLIC_KEY }}" >> $GITHUB_ENV

      # Build into the local daemon only (push: false + load: true) — publishing
      # happens below, after the Trivy gate passes, so a vulnerable image never reaches GHCR. Revisit if `platforms:` (multi-arch) is added.
      - name: Build ${{ matrix.image }} (local, pre-scan)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          build-args: ${{ env.BUILD_ARGS }}
          tags: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Gates the push below (finding = job fails before publish). OS packages only — app deps are already gated pre-merge by per-service audits.
      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.sha }}
          format: sarif
          output: trivy-results-${{ matrix.image }}.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          trivyignores: .trivyignore
          vuln-type: os # OS packages only — app deps gated by per-service CI

      - name: Upload Trivy scan results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
        continue-on-error: true
        with:
          sarif_file: trivy-results-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}

      # Same context/build-args/cache as the pre-scan build, so this resolves from
      # the warm gha cache (no recompile) and pushes the exact scanned layers, now also tagged :latest.
      - name: Push ${{ matrix.image }} (scan passed)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ env.BUILD_ARGS }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha

      - name: Print image tag
        # Pass expansions through env (set as a literal value), never inline
        # them into the shell — avoids template-injection as a standing pattern.
        env:
          IMAGE_REF: ${{ env.IMAGE_PREFIX }}/${{ matrix.image }}:${{ github.sha }}
        run: echo "Successfully pushed $IMAGE_REF"
