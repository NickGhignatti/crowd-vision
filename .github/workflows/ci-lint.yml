name: lint

on:
  push:
    branches:
      - master
    paths:
      - 'client/**'
      - 'server/**'
      - 'scripts/**'
      - '.husky/**'
      - '.prettierignore'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-lint.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'client/**'
      - 'server/**'
      - 'scripts/**'
      - '.husky/**'
      - '.prettierignore'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci-lint.yml'
  workflow_dispatch:
  workflow_call:

jobs:
  lint:
    name: lint (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - client
          - auth-service
          - notification-service
          - sensor-service
          - socket-service
          - twin-service
          - agent-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Python (agent-service only)
        if: matrix.workspace == 'agent-service'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv (agent-service only)
        if: matrix.workspace == 'agent-service'
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python deps (agent-service only)
        if: matrix.workspace == 'agent-service'
        working-directory: ./server/agent-service
        run: uv sync --all-extras --dev

      - name: Run lint for workspace
        run: npm run lint --workspace ${{ matrix.workspace }}

