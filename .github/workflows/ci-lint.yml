name: lint

on:
  push:
    branches:
      - master
    paths:
      - 'client/**'
      - 'server/**'
      - 'simulators/**'
      - 'tooling/**'
      - '.moon/**'
      - 'scripts/**'
      - '.prettierignore'
      - '.github/workflows/ci-lint.yml'
  workflow_dispatch:
  workflow_call:

jobs:
  lint:
    name: lint (${{ matrix.workspace.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - { name: client,               dir: client }
          - { name: auth-service,         dir: server/auth-service }
          - { name: notification-service, dir: server/notification-service }
          - { name: sensor-service,       dir: server/sensor-service }
          - { name: socket-service,       dir: server/socket-service }
          - { name: twin-service,         dir: server/twin-service }
          - { name: sensor-simulator,     dir: simulators/sensor-simulator }
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: npm
          cache-dependency-path: ${{ matrix.workspace.dir }}/package-lock.json

      - name: Install shared tooling
        working-directory: tooling
        run: npm ci

      - name: Install service deps
        working-directory: ${{ matrix.workspace.dir }}
        run: npm ci

      - name: Lint
        working-directory: ${{ matrix.workspace.dir }}
        run: npm run lint

  agent-lint:
    name: lint (agent-service)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python deps
        working-directory: ./server/agent-service
        run: uv sync --all-extras --dev

      - name: Lint
        working-directory: ./server/agent-service
        run: uv run ruff check . && uv run ruff format --check . && uv run pyright
