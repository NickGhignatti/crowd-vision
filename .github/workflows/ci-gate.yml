name: CI Gate

on:
  pull_request:
    branches: [master]

concurrency:
  group: ci-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # ── Detect which paths changed ─────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      agent: ${{ steps.filter.outputs.agent }}
      client: ${{ steps.filter.outputs.client }}
      contracts: ${{ steps.filter.outputs.contracts }}
      notification: ${{ steps.filter.outputs.notification }}
      sensor: ${{ steps.filter.outputs.sensor }}
      socket: ${{ steps.filter.outputs.socket }}
      twin: ${{ steps.filter.outputs.twin }}
      k8s: ${{ steps.filter.outputs.k8s }}
      shared: ${{ steps.filter.outputs.shared }}
      docker_matrix: ${{ steps.docker.outputs.matrix }}
      has_images: ${{ steps.docker.outputs.has_images }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'server/auth-service/**'
              - '.github/workflows/ci-auth.yml'
            agent:
              - 'server/agent-service/**'
              - '.github/workflows/ci-agent.yml'
            client:
              - 'client/**'
              - '.github/workflows/ci-client.yml'
            contracts:
              - 'server/contracts-service/**'
              - '.github/workflows/ci-contracts.yml'
            notification:
              - 'server/notification-service/**'
              - '.github/workflows/ci-notification.yml'
            sensor:
              - 'server/sensor-service/**'
              - '.github/workflows/ci-sensor.yml'
            socket:
              - 'server/socket-service/**'
              - '.github/workflows/ci-socket.yml'
            twin:
              - 'server/twin-service/**'
              - '.github/workflows/ci-twin.yml'
            k8s:
              - 'k8s/**'
              - '.github/workflows/ci-k8s.yml'
            shared:
              - 'tooling/eslint-config/**'

      # Build the Docker matrix (include-form) from the changed services that
      # ship an image. Only these get a PR-time build
      - name: Compute changed Docker images
        id: docker
        run: |
          inc='[]'
          add() { inc=$(jq -cn --argjson a "$inc" --arg c "$1" --arg i "$2" '$a + [{context:$c, image:$i}]'); }
          if [ "${{ steps.filter.outputs.auth }}" = "true" ];         then add "./server/auth-service"         "crowdvision-auth"; fi
          if [ "${{ steps.filter.outputs.twin }}" = "true" ];         then add "./server/twin-service"         "crowdvision-twin"; fi
          if [ "${{ steps.filter.outputs.notification }}" = "true" ]; then add "./server/notification-service" "crowdvision-notification"; fi
          if [ "${{ steps.filter.outputs.socket }}" = "true" ];       then add "./server/socket-service"       "crowdvision-socket"; fi
          if [ "${{ steps.filter.outputs.agent }}" = "true" ];        then add "./server/agent-service"        "crowdvision-agent"; fi
          if [ "${{ steps.filter.outputs.sensor }}" = "true" ];       then add "./server/sensor-service"       "crowdvision-sensor"; fi
          if [ "${{ steps.filter.outputs.contracts }}" = "true" ];    then add "./server/contracts-service"    "crowdvision-contracts"; fi
          if [ "${{ steps.filter.outputs.client }}" = "true" ];       then add "./client"                      "crowdvision-client"; fi
          echo "matrix={\"include\":$inc}" >> "$GITHUB_OUTPUT"
          if [ "$inc" = "[]" ]; then
            echo "has_images=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_images=true" >> "$GITHUB_OUTPUT"
          fi

  auth:
    needs: changes
    if: needs.changes.outputs.auth == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/ci-auth.yml

  agent:
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    uses: ./.github/workflows/ci-agent.yml

  client:
    needs: changes
    if: needs.changes.outputs.client == 'true'
    uses: ./.github/workflows/ci-client.yml

  contracts:
    needs: changes
    if: needs.changes.outputs.contracts == 'true'
    uses: ./.github/workflows/ci-contracts.yml

  notification:
    needs: changes
    if: needs.changes.outputs.notification == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/ci-notification.yml

  sensor:
    needs: changes
    if: needs.changes.outputs.sensor == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/ci-sensor.yml

  socket:
    needs: changes
    if: needs.changes.outputs.socket == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/ci-socket.yml

  twin:
    needs: changes
    if: needs.changes.outputs.twin == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/ci-twin.yml

  docker:
    needs: changes
    if: needs.changes.outputs.has_images == 'true'
    uses: ./.github/workflows/ci-docker.yml
    with:
      images: ${{ needs.changes.outputs.docker_matrix }}

  k8s:
    needs: changes
    if: needs.changes.outputs.k8s == 'true'
    uses: ./.github/workflows/ci-k8s.yml

  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs:
      - auth
      - agent
      - client
      - contracts
      - notification
      - sensor
      - socket
      - twin
      - docker
      - k8s
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more CI jobs failed or were cancelled"
            exit 1
          fi
          echo "All CI jobs passed"
