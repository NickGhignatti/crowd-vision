name: CI Gate

on:
  pull_request:
    branches: [master]

concurrency:
  group: ci-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # ── Detect which paths changed ─────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      chat: ${{ steps.filter.outputs.chat }}
      agent: ${{ steps.filter.outputs.agent }}
      client: ${{ steps.filter.outputs.client }}
      contracts: ${{ steps.filter.outputs.contracts }}
      notification: ${{ steps.filter.outputs.notification }}
      sensor: ${{ steps.filter.outputs.sensor }}
      socket: ${{ steps.filter.outputs.socket }}
      twin: ${{ steps.filter.outputs.twin }}
      claims_gateway: ${{ steps.filter.outputs.claims_gateway }}
      tenancy: ${{ steps.filter.outputs.tenancy }}
      registry: ${{ steps.filter.outputs.registry }}
      provisioner: ${{ steps.filter.outputs.provisioner }}
      k8s: ${{ steps.filter.outputs.k8s }}
      shared: ${{ steps.filter.outputs.shared }}
      ci: ${{ steps.filter.outputs.ci }}
      infra: ${{ steps.filter.outputs.infra }}
      simulators: ${{ steps.filter.outputs.simulators }}
      deps: ${{ steps.filter.outputs.deps }}
      docker_matrix: ${{ steps.docker.outputs.matrix }}
      has_images: ${{ steps.docker.outputs.has_images }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            chat:
              - 'server/chat-service/**'
              - '.github/workflows/ci-chat.yml'
            agent:
              - 'server/agent-service/**'
              - '.github/workflows/ci-agent.yml'
            client:
              - 'client/**'
              - '.github/workflows/ci-client.yml'
            contracts:
              - 'server/contracts-service/**'
              - '.github/workflows/ci-contracts.yml'
            notification:
              - 'server/notification-service/**'
              - '.github/workflows/ci-notification.yml'
            sensor:
              - 'server/sensor-service/**'
              - '.github/workflows/ci-sensor.yml'
            socket:
              - 'server/socket-service/**'
              - '.github/workflows/ci-socket.yml'
            twin:
              - 'server/twin-service/**'
              - '.github/workflows/ci-twin.yml'
            claims_gateway:
              - 'server/claims-gateway/**'
              - '.github/workflows/ci-claims-gateway.yml'
            tenancy:
              - 'server/tenancy-service/**'
              - '.github/workflows/ci-tenancy-service.yml'
            registry:
              - 'server/registry-service/**'
              - '.github/workflows/ci-registry-service.yml'
            provisioner:
              - 'server/provisioner/**'
              - '.github/workflows/ci-provisioner.yml'
            k8s:
              - 'k8s/**'
              - '.github/workflows/ci-k8s.yml'
            shared:
              - 'tooling/eslint-config/**'
            ci:
              - '.github/**'
            infra:
              - 'scripts/**'
              - 'tooling/**'
              - 'Justfile'
              - '.github/workflows/ci-infra.yml'
            simulators:
              - 'simulators/**'
              - '.github/workflows/ci-simulators.yml'
            # Any dependency manifest/lockfile across all ecosystems — gates the
            # PR against newly-introduced vulnerable dependencies.
            deps:
              - '**/package.json'
              - '**/package-lock.json'
              - '**/pyproject.toml'
              - '**/uv.lock'
              - '**/requirements*.txt'
              - '**/Cargo.toml'
              - '**/Cargo.lock'

      # Build the Docker matrix (include-form) from the changed services that
      # ship an image. Only these get a PR-time build
      - name: Compute changed Docker images
        id: docker
        run: |
          inc='[]'
          # twin-service and agent-service COPY the shared server/auth-policy
          # (+ auth-contracts) bundle into their image, a sibling directory a
          # per-service build context can't reach — those two build from the
          # repo root with an explicit dockerfile path instead, as do all four
          # Go control-plane services (claims-gateway, tenancy-service,
          # registry-service, provisioner — see their own Dockerfiles). Every
          # other service still uses its own directory as both context and
          # Dockerfile location.
          add() { inc=$(jq -cn --argjson a "$inc" --arg c "$1" --arg i "$2" --arg d "$1/Dockerfile" '$a + [{context:$c, image:$i, dockerfile:$d}]'); }
          add_repo_root() { inc=$(jq -cn --argjson a "$inc" --arg i "$2" --arg d "$1/Dockerfile" '$a + [{context:".", image:$i, dockerfile:$d}]'); }
          if [ "${{ steps.filter.outputs.chat }}" = "true" ];         then add "./server/chat-service"         "crowdvision-chat"; fi
          if [ "${{ steps.filter.outputs.twin }}" = "true" ];         then add_repo_root "server/twin-service" "crowdvision-twin"; fi
          if [ "${{ steps.filter.outputs.notification }}" = "true" ]; then add "./server/notification-service" "crowdvision-notification"; fi
          if [ "${{ steps.filter.outputs.socket }}" = "true" ];       then add "./server/socket-service"       "crowdvision-socket"; fi
          if [ "${{ steps.filter.outputs.agent }}" = "true" ];        then add_repo_root "server/agent-service" "crowdvision-agent"; fi
          if [ "${{ steps.filter.outputs.sensor }}" = "true" ];       then add "./server/sensor-service"       "crowdvision-sensor"; fi
          if [ "${{ steps.filter.outputs.contracts }}" = "true" ];    then add "./server/contracts-service"    "crowdvision-contracts"; fi
          if [ "${{ steps.filter.outputs.client }}" = "true" ];       then add "./client"                      "crowdvision-client"; fi
          if [ "${{ steps.filter.outputs.claims_gateway }}" = "true" ]; then add_repo_root "server/claims-gateway"   "crowdvision-claims-gateway"; fi
          if [ "${{ steps.filter.outputs.tenancy }}" = "true" ];         then add_repo_root "server/tenancy-service" "crowdvision-tenancy"; fi
          if [ "${{ steps.filter.outputs.registry }}" = "true" ];        then add_repo_root "server/registry-service" "crowdvision-registry"; fi
          if [ "${{ steps.filter.outputs.provisioner }}" = "true" ];     then add_repo_root "server/provisioner"     "crowdvision-provisioner"; fi
          echo "matrix={\"include\":$inc}" >> "$GITHUB_OUTPUT"
          if [ "$inc" = "[]" ]; then
            echo "has_images=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_images=true" >> "$GITHUB_OUTPUT"
          fi

  chat:
    needs: changes
    if: needs.changes.outputs.chat == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/ci-chat.yml

  agent:
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    uses: ./.github/workflows/ci-agent.yml

  client:
    needs: changes
    if: needs.changes.outputs.client == 'true'
    uses: ./.github/workflows/ci-client.yml

  contracts:
    needs: changes
    if: needs.changes.outputs.contracts == 'true'
    uses: ./.github/workflows/ci-contracts.yml

  notification:
    needs: changes
    if: needs.changes.outputs.notification == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/ci-notification.yml

  sensor:
    needs: changes
    if: needs.changes.outputs.sensor == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/ci-sensor.yml

  socket:
    needs: changes
    if: needs.changes.outputs.socket == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/ci-socket.yml

  twin:
    needs: changes
    if: needs.changes.outputs.twin == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/ci-twin.yml

  claims-gateway:
    needs: changes
    if: needs.changes.outputs.claims_gateway == 'true'
    uses: ./.github/workflows/ci-claims-gateway.yml

  tenancy-service:
    needs: changes
    if: needs.changes.outputs.tenancy == 'true'
    uses: ./.github/workflows/ci-tenancy-service.yml

  registry-service:
    needs: changes
    if: needs.changes.outputs.registry == 'true'
    uses: ./.github/workflows/ci-registry-service.yml

  provisioner:
    needs: changes
    if: needs.changes.outputs.provisioner == 'true'
    uses: ./.github/workflows/ci-provisioner.yml

  docker:
    needs: changes
    if: needs.changes.outputs.has_images == 'true'
    uses: ./.github/workflows/ci-docker.yml
    with:
      images: ${{ needs.changes.outputs.docker_matrix }}

  k8s:
    needs: changes
    if: needs.changes.outputs.k8s == 'true'
    uses: ./.github/workflows/ci-k8s.yml

  # Statically validates the workflow files themselves.
  workflows-lint:
    needs: changes
    if: needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      # The image bundles shellcheck, but it is disabled here until its findings on the
      # existing run: blocks are triaged — install shellcheck locally, run
      # `actionlint`, fix what it reports, then drop `-shellcheck=` so CI
      # gains that layer too.
      - name: actionlint
        uses: docker://rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667 # 1.7.12
        with:
          args: -no-color -shellcheck=

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: zizmor
        run: |
          pip install zizmor==1.25.2
          zizmor --offline --min-severity medium .github/workflows/

  infra:
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    uses: ./.github/workflows/ci-infra.yml

  simulators:
    needs: changes
    if: needs.changes.outputs.simulators == 'true'
    uses: ./.github/workflows/ci-simulators.yml

  # Blocks a PR that introduces a dependency with a known high/critical CVE.
  dependency-review:
    needs: changes
    if: needs.changes.outputs.deps == 'true'
    uses: ./.github/workflows/ci-dependency-review.yml

  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs:
      - changes
      - chat
      - agent
      - client
      - contracts
      - notification
      - sensor
      - socket
      - twin
      - claims-gateway
      - tenancy-service
      - registry-service
      - provisioner
      - docker
      - k8s
      - workflows-lint
      - infra
      - simulators
      - dependency-review
    if: always()
    steps:
      - name: Verify every job succeeded or legitimately skipped
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
          CHANGES: ${{ needs.changes.result }}
        run: |
          echo "results: $RESULTS"
          # The fan-out root must have succeeded — if it failed or was
          # cancelled, every service job was skipped without ever being
          # evaluated, and a green gate here would be a false pass.
          if [ "$CHANGES" != "success" ]; then
            echo "::error::'changes' ended in '$CHANGES' — CI never actually evaluated this PR"
            exit 1
          fi
          # Whitelist: success (ran and passed) or skipped (path filter says
          # unaffected). Anything else — failure, cancelled — fails the gate.
          read -ra results <<< "$RESULTS"
          for r in "${results[@]}"; do
            case "$r" in
              success|skipped) ;;
              *) echo "::error::a required job ended in '$r'"; exit 1 ;;
            esac
          done
          echo "All required jobs passed or were legitimately skipped"
