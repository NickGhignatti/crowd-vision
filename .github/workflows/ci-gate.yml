name: CI Gate

on:
  pull_request:
    branches: [master]

concurrency:
  group: ci-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      chat: ${{ steps.filter.outputs.chat }}
      agent: ${{ steps.filter.outputs.agent }}
      client: ${{ steps.filter.outputs.client }}
      contracts: ${{ steps.filter.outputs.contracts }}
      notification: ${{ steps.filter.outputs.notification }}
      sensor: ${{ steps.filter.outputs.sensor }}
      socket: ${{ steps.filter.outputs.socket }}
      twin: ${{ steps.filter.outputs.twin }}
      claims_gateway: ${{ steps.filter.outputs.claims_gateway }}
      tenancy: ${{ steps.filter.outputs.tenancy }}
      registry: ${{ steps.filter.outputs.registry }}
      provisioner: ${{ steps.filter.outputs.provisioner }}
      auth_policy: ${{ steps.filter.outputs.auth_policy }}
      auth_contracts: ${{ steps.filter.outputs.auth_contracts }}
      auth_middleware: ${{ steps.filter.outputs.auth_middleware }}
      k8s: ${{ steps.filter.outputs.k8s }}
      shared: ${{ steps.filter.outputs.shared }}
      ci: ${{ steps.filter.outputs.ci }}
      infra: ${{ steps.filter.outputs.infra }}
      simulators: ${{ steps.filter.outputs.simulators }}
      deps: ${{ steps.filter.outputs.deps }}
      docker_matrix: ${{ steps.docker.outputs.matrix }}
      has_images: ${{ steps.docker.outputs.has_images }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590
        id: filter
        with:
          filters: |
            chat:
              - 'server/chat-service/**'
            agent:
              - 'server/agent-service/**'
            client:
              - 'client/**'
              - '.github/workflows/ci-client.yml'
            contracts:
              - 'server/contracts-service/**'
            notification:
              - 'server/notification-service/**'
            sensor:
              - 'server/sensor-service/**'
            socket:
              - 'server/socket-service/**'
            twin:
              - 'server/twin-service/**'
            claims_gateway:
              - 'server/claims-gateway/**'
            tenancy:
              - 'server/tenancy-service/**'
            registry:
              - 'server/registry-service/**'
            provisioner:
              - 'server/provisioner/**'
            auth_policy:
              - 'server/auth-policy/**'
            auth_contracts:
              - 'server/auth-contracts/**'
            auth_middleware:
              - 'server/auth-middleware/**'
            k8s:
              - 'k8s/**'
              - '.github/workflows/ci-k8s.yml'
            shared:
              - 'tooling/eslint-config/**'
            ci:
              - '.github/**'
            infra:
              - 'scripts/**'
              - 'tooling/**'
              - 'Justfile'
              - '.github/workflows/ci-infra.yml'
            simulators:
              - 'simulators/**'
              - '.github/workflows/ci-simulators.yml'
            deps:
              - '**/package.json'
              - '**/package-lock.json'
              - '**/pyproject.toml'
              - '**/uv.lock'
              - '**/requirements*.txt'
              - '**/Cargo.toml'
              - '**/Cargo.lock'

      - name: Compute changed Docker images
        id: docker
        env:
          # steps.filter.outputs isn't directly indexable in bash, so pass the
          # whole outputs object through as JSON and look keys up with jq.
          CHANGED: ${{ toJSON(steps.filter.outputs) }}
        run: |
          # lang tells ci-docker.yml which build strategy to use: go/rust/node
          # images inject a pre-built artifact from the matching CI job; python
          # and client have no artifact-injection Dockerfile and build from
          # their own real Dockerfile instead. Metadata comes from the single
          # registry in .github/services.json (also used by cd-registry.yml,
          # cd-coverage.yml, and maint-cleanup.yml).
          MATRIX=$(jq -cn --slurpfile reg .github/services.json --argjson changed "$CHANGED" '
            [ $reg[0][] | select(.image and (.ci != false)) | select($changed[(.filter_key // .key)] == "true") |
              {context: ("./" + .dir), image: .image, lang: .lang} ]
          ')

          echo "matrix={\"include\":$MATRIX}" >> "$GITHUB_OUTPUT"
          if [ "$MATRIX" = "[]" ]; then echo "has_images=false" >> "$GITHUB_OUTPUT"; else echo "has_images=true" >> "$GITHUB_OUTPUT"; fi

  client:
    needs: changes
    if: needs.changes.outputs.client == 'true'
    uses: ./.github/workflows/ci-client.yml

  # Every service calls its language's CI template directly (rather than
  # going through an intermediate discovery/matrix workflow) so each one gets
  # its own PR status check and to avoid stacking reusable-workflow nesting.
  auth-contracts:
    needs: changes
    if: needs.changes.outputs.auth_contracts == 'true'
    uses: ./.github/workflows/templates/go/ci.yml
    with:
      service_key: auth-contracts
      working_directory: server/auth-contracts
      builds_binary: false

  auth-middleware:
    needs: changes
    # auth-middleware's go.mod replaces auth-contracts with a local path, so it
    # builds directly against auth-contracts' source and must re-run when it changes.
    if: needs.changes.outputs.auth_middleware == 'true' || needs.changes.outputs.auth_contracts == 'true'
    uses: ./.github/workflows/templates/go/ci.yml
    with:
      service_key: auth-middleware
      working_directory: server/auth-middleware
      builds_binary: false

  auth-policy:
    needs: changes
    if: needs.changes.outputs.auth_policy == 'true'
    uses: ./.github/workflows/templates/go/ci.yml
    with:
      service_key: auth-policy
      working_directory: server/auth-policy
      builds_binary: false

  claims-gateway:
    needs: changes
    if: needs.changes.outputs.claims_gateway == 'true'
    uses: ./.github/workflows/templates/go/ci.yml
    with:
      service_key: claims-gateway
      working_directory: server/claims-gateway

  provisioner:
    needs: changes
    if: needs.changes.outputs.provisioner == 'true'
    uses: ./.github/workflows/templates/go/ci.yml
    with:
      service_key: provisioner
      working_directory: server/provisioner

  registry-service:
    needs: changes
    if: needs.changes.outputs.registry == 'true'
    uses: ./.github/workflows/templates/go/ci.yml
    with:
      service_key: registry-service
      working_directory: server/registry-service

  tenancy-service:
    needs: changes
    if: needs.changes.outputs.tenancy == 'true'
    uses: ./.github/workflows/templates/go/ci.yml
    with:
      service_key: tenancy-service
      working_directory: server/tenancy-service

  chat:
    needs: changes
    if: needs.changes.outputs.chat == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/templates/node/ci.yml
    with:
      service_key: chat
      working_directory: server/chat-service

  notification:
    needs: changes
    if: needs.changes.outputs.notification == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/templates/node/ci.yml
    with:
      service_key: notification
      working_directory: server/notification-service

  sensor:
    needs: changes
    if: needs.changes.outputs.sensor == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/templates/node/ci.yml
    with:
      service_key: sensor
      working_directory: server/sensor-service

  socket:
    needs: changes
    if: needs.changes.outputs.socket == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/templates/node/ci.yml
    with:
      service_key: socket
      working_directory: server/socket-service

  twin:
    needs: changes
    if: needs.changes.outputs.twin == 'true' || needs.changes.outputs.shared == 'true'
    uses: ./.github/workflows/templates/rust/ci.yml
    with:
      service_key: twin
      working_directory: server/twin-service
      needs_mongo: true

  contracts:
    needs: changes
    if: needs.changes.outputs.contracts == 'true'
    uses: ./.github/workflows/templates/rust/ci.yml
    with:
      service_key: contracts
      working_directory: server/contracts-service
      needs_mongo: false

  agent:
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    uses: ./.github/workflows/templates/python/ci.yml
    with:
      service_key: agent
      working_directory: server/agent-service

  docker:
    needs:
      - changes
      - client
      - auth-contracts
      - auth-middleware
      - auth-policy
      - claims-gateway
      - provisioner
      - registry-service
      - tenancy-service
      - chat
      - notification
      - sensor
      - socket
      - twin
      - contracts
      - agent
    if: needs.changes.outputs.has_images == 'true'
    uses: ./.github/workflows/ci-docker.yml
    with:
      images: ${{ needs.changes.outputs.docker_matrix }}

  k8s:
    needs: changes
    if: needs.changes.outputs.k8s == 'true'
    uses: ./.github/workflows/ci-k8s.yml

  # Statically validates the workflow files themselves.
  workflows-lint:
    needs: changes
    if: needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: actionlint
        uses: docker://rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
        with:
          args: -no-color -shellcheck=

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: zizmor
        run: |
          pip install zizmor==1.25.2
          zizmor --offline --min-severity medium .github/workflows/

  infra:
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    uses: ./.github/workflows/ci-infra.yml

  simulators:
    needs: changes
    if: needs.changes.outputs.simulators == 'true'
    uses: ./.github/workflows/ci-simulators.yml

  dependency-review:
    needs: changes
    if: needs.changes.outputs.deps == 'true'
    uses: ./.github/workflows/ci-dependency-review.yml

  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs:
      - changes
      - client
      - auth-contracts
      - auth-middleware
      - auth-policy
      - claims-gateway
      - provisioner
      - registry-service
      - tenancy-service
      - chat
      - notification
      - sensor
      - socket
      - twin
      - contracts
      - agent
      - docker
      - k8s
      - workflows-lint
      - infra
      - simulators
      - dependency-review
    if: always()
    steps:
      - name: Verify every job succeeded or legitimately skipped
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
          CHANGES: ${{ needs.changes.result }}
        run: |
          echo "results: $RESULTS"
          if [ "$CHANGES" != "success" ]; then
            echo "::error::'changes' ended in '$CHANGES' — CI never actually evaluated this PR"
            exit 1
          fi
          # Whitelist: success (ran and passed) or skipped.
          read -ra results <<< "$RESULTS"
          for r in "${results[@]}"; do
            case "$r" in
              success|skipped) ;;
              *) echo "::error::a required job ended in '$r'"; exit 1 ;;
            esac
          done
          echo "All required jobs passed or were legitimately skipped"
