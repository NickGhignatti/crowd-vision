name: CI Gate

on:
  pull_request:
    branches: [master]

concurrency:
  group: ci-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # ── Detect which paths changed ─────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.filter.outputs.auth }}
      agent: ${{ steps.filter.outputs.agent }}
      client: ${{ steps.filter.outputs.client }}
      contracts: ${{ steps.filter.outputs.contracts }}
      notification: ${{ steps.filter.outputs.notification }}
      sensor: ${{ steps.filter.outputs.sensor }}
      socket: ${{ steps.filter.outputs.socket }}
      twin: ${{ steps.filter.outputs.twin }}
      source: ${{ steps.filter.outputs.source }}
      k8s: ${{ steps.filter.outputs.k8s }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            auth:
              - 'server/auth-service/**'
              - '.github/workflows/ci-auth.yml'
            agent:
              - 'server/agent-service/**'
              - '.github/workflows/ci-agent.yml'
            client:
              - 'client/**'
              - '.github/workflows/ci-client.yml'
            contracts:
              - 'server/contracts-service/**'
              - '.github/workflows/ci-contracts.yml'
            notification:
              - 'server/notification-service/**'
              - '.github/workflows/ci-notification.yml'
            sensor:
              - 'server/sensor-service/**'
              - '.github/workflows/ci-sensor.yml'
            socket:
              - 'server/socket-service/**'
              - '.github/workflows/ci-socket.yml'
            twin:
              - 'server/twin-service/**'
              - '.github/workflows/ci-twin.yml'
            source:
              - 'client/**'
              - 'server/**'
              - 'simulators/**'
              - 'tooling/**'
              - '.moon/**'
              - '.github/workflows/ci-lint.yml'
              - '.github/workflows/ci-docker.yml'
              - '.github/workflows/ci-deps.yml'
            k8s:
              - 'k8s/**'
              - '.github/workflows/ci-k8s.yml'

  audit:
    uses: ./.github/workflows/ci-audit.yml

  lint:
    needs: changes
    if: needs.changes.outputs.source == 'true' && github.actor != 'dependabot[bot]'
    uses: ./.github/workflows/ci-lint.yml

  dependencies:
    needs: changes
    if: needs.changes.outputs.source == 'true'
    uses: ./.github/workflows/ci-deps.yml

  docker:
    needs: changes
    if: needs.changes.outputs.source == 'true' && github.actor != 'dependabot[bot]'
    uses: ./.github/workflows/ci-docker.yml

  auth:
    needs: changes
    if: needs.changes.outputs.auth == 'true'
    uses: ./.github/workflows/ci-auth.yml

  agent:
    needs: changes
    if: needs.changes.outputs.agent == 'true'
    uses: ./.github/workflows/ci-agent.yml

  client:
    needs: changes
    if: needs.changes.outputs.client == 'true'
    uses: ./.github/workflows/ci-client.yml

  contracts:
    needs: changes
    if: needs.changes.outputs.contracts == 'true'
    uses: ./.github/workflows/ci-contracts.yml

  notification:
    needs: changes
    if: needs.changes.outputs.notification == 'true'
    uses: ./.github/workflows/ci-notification.yml

  sensor:
    needs: changes
    if: needs.changes.outputs.sensor == 'true'
    uses: ./.github/workflows/ci-sensor.yml

  socket:
    needs: changes
    if: needs.changes.outputs.socket == 'true'
    uses: ./.github/workflows/ci-socket.yml

  twin:
    needs: changes
    if: needs.changes.outputs.twin == 'true'
    uses: ./.github/workflows/ci-twin.yml

  k8s:
    needs: changes
    if: needs.changes.outputs.k8s == 'true'
    uses: ./.github/workflows/ci-k8s.yml

  # Skipped jobs resolve as 'skipped', not 'failure', so this check is safe
  # to use as the single required branch-protection status check.
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs:
      - lint
      - audit
      - dependencies
      - auth
      - agent
      - client
      - notification
      - twin
      - sensor
      - socket
      - contracts
      - docker
      - k8s
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more CI jobs failed or were cancelled"
            exit 1
          fi
          echo "All CI jobs passed"
