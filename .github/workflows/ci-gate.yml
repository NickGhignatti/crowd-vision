name: CI Gate

on:
  pull_request:
    branches: [master]

concurrency:
  group: ci-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    uses: ./.github/workflows/ci-lint.yml

  audit:
    uses: ./.github/workflows/ci-audit.yml

  dependencies:
    uses: ./.github/workflows/ci-deps.yml

  auth:
    uses: ./.github/workflows/ci-auth.yml

  client:
    uses: ./.github/workflows/ci-client.yml

  notification:
    uses: ./.github/workflows/ci-notification.yml

  twin:
    uses: ./.github/workflows/ci-twin.yml

  sensor:
    uses: ./.github/workflows/ci-sensor.yml

  socket:
    uses: ./.github/workflows/ci-socket.yml

  contracts:
    uses: ./.github/workflows/ci-contracts.yml

  docker:
    uses: ./.github/workflows/ci-docker.yml

  commitlint:
    uses: ./.github/workflows/ci-commitlint.yml

  k8s:
    uses: ./.github/workflows/ci-k8s.yml

  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs:
      - lint
      - audit
      - dependencies
      - auth
      - client
      - notification
      - twin
      - sensor
      - socket
      - contracts
      - docker
      - commitlint
      - k8s
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more CI jobs failed or were cancelled"
            exit 1
          fi
          echo "All CI jobs passed"
