name: CI Kubernetes Manifests

on:
  workflow_call:

jobs:
  validate:
    name: Validate K8s manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Install K8s Tooling
        run: |
          # 1. Kubeconform
          curl -sSLo kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform.tar.gz kubeconform
          sudo mv kubeconform /usr/local/bin/

          # 2. Pluto
          curl -sSLo pluto.tar.gz https://github.com/FairwindsOps/pluto/releases/download/v5.24.0/pluto_5.24.0_linux_amd64.tar.gz
          tar xf pluto.tar.gz pluto
          sudo mv pluto /usr/local/bin/

          # 3. Kube-score
          curl -sSLo kube-score https://github.com/zegl/kube-score/releases/download/v1.20.0/kube-score_1.20.0_linux_amd64
          chmod +x kube-score
          sudo mv kube-score /usr/local/bin/

      - name: Validate manifests
        run: |
          find k8s/ -type f -name '*.yml' -print0 | xargs -0 kubeconform \
            -strict \
            -summary \
            -kubernetes-version 1.32.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'

      - name: Check for deprecated API versions
        run: pluto detect-files -d k8s/

      - name: Score manifests
        run: |
          find k8s/ -type f -name '*.yml' -print0 | xargs -0 kube-score score \
            --ignore-test pod-networkpolicy \
            --ignore-test pod-disruption-budget \
            --ignore-test container-security-context-user-group-id \
            --ignore-test container-security-context-read-only-root-filesystem \
            --ignore-test container-image-tag \
            --ignore-test container-image-pull-policy \
            --ignore-test pod-probes-identical
