name: CD Release

on:
  push:
    branches:
      - master

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    steps:
      # A dedicated PAT (not GITHUB_TOKEN) so the release PR release-please opens
      # is authored by a real identity — PRs opened by the default GITHUB_TOKEN
      # don't trigger other workflows, which would leave the release PR without
      # CI checks.
      - name: Run Release Please
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071
        with:
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
