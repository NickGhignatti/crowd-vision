name: Release

on:
  push:
    branches:
      - master

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: 🚀 Publish Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        # zizmor: ignore[artipacked] — semantic-release pushes the tag, CHANGELOG
        # and version bumps back to the repo, so the credential MUST persist here.
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          # Fine-grained scoped PAT
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.x
          cache: "npm"
          cache-dependency-path: tooling/package-lock.json

      - name: Install Tooling Dependencies
        working-directory: tooling
        run: npm ci

      - name: Run Semantic Release
        working-directory: tooling
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
        run: npx semantic-release
