name: lint

on:
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - 'server/**'
      - 'scripts/**'
      - '.husky/**'
      - '.prettierignore'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/lint.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'client/**'
      - 'server/**'
      - 'scripts/**'
      - '.husky/**'
      - '.prettierignore'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/lint.yml'
  workflow_dispatch:

jobs:
  lint:
    name: lint (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        workspace:
          - client
          - auth-service
          - notification-service
          - sensor-service
          - sensor-simulator
          - socket-service
          - twin-service
          - agent-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint for workspace
        run: npm run lint --workspace ${{ matrix.workspace }}

