name: claims-gateway-ci

on:
  workflow_call:

jobs:
  claims-gateway:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./server/claims-gateway

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      # go.mod has local `replace` directives onto sibling modules
      # (server/auth-contracts, server/auth-middleware) — a full checkout
      # already puts those on disk, no sparse-checkout needed.
      - name: Setup Go toolchain
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: server/claims-gateway/go.mod
          cache-dependency-path: server/claims-gateway/go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test with coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Coverage summary
        if: always()
        run: |
          {
            echo "| Service | Coverage |"
            echo "| --- | --- |"
            echo "| **claims-gateway** | $(go tool cover -func=coverage.out | tail -1 | awk '{print $3}') |"
          } >> "$GITHUB_STEP_SUMMARY" || true
