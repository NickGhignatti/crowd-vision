name: agent-service-ci

on:
  workflow_call:

jobs:
  quality:
    name: lint + type-check + audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server/agent-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Dependencies
        run: uv sync --locked --all-extras --dev

      - name: Lint
        run: uv run ruff check .

      - name: Check Formatting
        run: uv run ruff format --check .

      - name: Type Check
        run: uv run pyright

      - name: Audit Dependencies
        run: uv audit

  tests:
    name: tests (unit + integration)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server/agent-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Dependencies
        run: uv sync --locked --all-extras --dev

      - name: Run Tests
        run: uv run pytest
