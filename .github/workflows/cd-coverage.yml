name: Coverage

# Measures coverage for every service on each push to master and (next step)
# publishes the aggregated badge.json + summary.json to the `coverage-data`
# orphan branch.
on:
  push:
    branches: [master]
  workflow_dispatch:

# Publish job (added next) raises to contents:write.
permissions:
  contents: read

concurrency:
  group: coverage-publish
  cancel-in-progress: false

jobs:
  node:
    name: coverage (${{ matrix.key }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { key: chat, dir: server/chat-service }
          - { key: notification, dir: server/notification-service }
          - { key: sensor, dir: server/sensor-service }
          - { key: socket, dir: server/socket-service }
          - { key: twin, dir: server/twin-service }
          - { key: client, dir: client }
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run coverage
        run: npm run test:coverage

      - name: Upload report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.key }}
          path: ${{ matrix.dir }}/coverage/coverage-summary.json
          if-no-files-found: error
          retention-days: 1

  agent:
    name: coverage (agent)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/agent-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-extras --dev

      - name: Run coverage
        run: uv run pytest

      - name: Upload report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: agent
          path: server/agent-service/coverage.xml
          if-no-files-found: error
          retention-days: 1

  contracts:
    name: coverage (contracts)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/contracts-service
    env:
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
      CARGO_INCREMENTAL: "0"
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          toolchain: stable
          components: llvm-tools-preview

      # swap for taiki-e/install-action@<sha> for a faster prebuilt binary.
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Run coverage
        run: cargo llvm-cov --json --summary-only --output-path coverage.json

      - name: Upload report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: contracts
          path: server/contracts-service/coverage.json
          if-no-files-found: error
          retention-days: 1

  # ── Aggregate the reports and publish to the coverage-data orphan branch ────
  publish:
    name: publish coverage-data
    needs: [node, agent, contracts]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Download coverage reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: coverage-artifacts

      - name: Aggregate into badge.json + summary.json
        run: python scripts/coverage-summary.py coverage-artifacts .

      # Build a single-commit orphan branch holding only the two generated files.
      # History lives in nothing — each run force-replaces the branch wholesale.
      - name: Publish to coverage-data branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan coverage-data-tmp
          git rm -rf --cached . > /dev/null 2>&1 || true
          git add -f badge.json summary.json
          git commit -m "coverage: ${SHA:0:7}"
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" coverage-data-tmp:coverage-data
