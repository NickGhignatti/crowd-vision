name: Coverage

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coverage-publish
  cancel-in-progress: false

jobs:
  node:
    name: coverage (node)
    strategy:
      fail-fast: false
      matrix:
        include:
          - { key: chat, dir: server/chat-service }
          - { key: notification, dir: server/notification-service }
          - { key: sensor, dir: server/sensor-service }
          - { key: socket, dir: server/socket-service }

    uses: ./.github/workflows/templates/node/coverage-report.yml
    with:
      service_key: ${{ matrix.key }}
      working_directory: ${{ matrix.dir }}

  python:
    name: coverage (python)
    uses: ./.github/workflows/templates/python/coverage-report.yml
    with:
      service_key: "agent"
      working_directory: "server/agent-service"

  rust:
    name: coverage (rust)
    strategy:
      fail-fast: false
      matrix:
        include:
          - { key: twin, dir: server/twin-service, needs_mongo: true }
          - { key: contracts, dir: server/contracts-service, needs_mongo: false }

    uses: ./.github/workflows/templates/rust/coverage-report.yml
    with:
      service_key: ${{ matrix.key }}
      working_directory: ${{ matrix.dir }}
      needs_mongo: ${{ matrix.needs_mongo }}

  go:
      name: coverage (go)
      strategy:
        fail-fast: false
        matrix:
          include:
            - { key: auth-contracts, dir: server/auth-contracts }
            - { key: auth-middleware, dir: server/auth-middleware }
            - { key: auth-policy, dir: server/auth-policy }
            - { key: claims-gateway, dir: server/claims-gateway }
            - { key: provisioner, dir: server/provisioner }
            - { key: registry-service, dir: server/registry-service }
            - { key: tenancy-service, dir: server/tenancy-service }

      uses: ./.github/workflows/templates/go/coverage-report.yml
      with:
        service_key: ${{ matrix.key }}
        working_directory: ${{ matrix.dir }}

  publish:
    name: publish coverage-data
    needs: [node, python, rust, go]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Download coverage reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: coverage-artifacts

      - name: Aggregate into badge.json + summary.json
        run: python scripts/coverage-summary.py coverage-artifacts .

      # Build a single-commit orphan branch holding only the two generated files.
      # History lives in nothing — each run force-replaces the branch wholesale.
      - name: Publish to coverage-data branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan coverage-data-tmp
          git rm -rf --cached . > /dev/null 2>&1 || true
          git add -f badge.json summary.json
          git commit -m "coverage: ${SHA:0:7}"
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" coverage-data-tmp:coverage-data
