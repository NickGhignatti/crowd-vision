name: CD Coverage

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coverage-publish
  cancel-in-progress: false

jobs:
  # Reads .github/services.json — the single source of truth for the service
  # list also used by ci-gate.yml, cd-registry.yml, and maint-cleanup.yml —
  # and splits it into one matrix per language.
  load-registry:
    runs-on: ubuntu-latest
    outputs:
      node: ${{ steps.split.outputs.node }}
      python: ${{ steps.split.outputs.python }}
      rust: ${{ steps.split.outputs.rust }}
      go: ${{ steps.split.outputs.go }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Split registry by language
        id: split
        run: |
          for lang in node python rust go; do
            matrix=$(jq -c --arg l "$lang" '[.[] | select(.lang == $l and .ci != false) | {key, dir, needs_mongo: (.needs_mongo // false)}]' .github/services.json)
            echo "$lang=$matrix" >> "$GITHUB_OUTPUT"
          done

  node:
    name: coverage (node)
    needs: load-registry
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.load-registry.outputs.node) }}

    uses: ./.github/workflows/tpl-node-coverage.yml
    with:
      service_key: ${{ matrix.key }}
      working_directory: ${{ matrix.dir }}

  python:
    name: coverage (python)
    needs: load-registry
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.load-registry.outputs.python) }}

    uses: ./.github/workflows/tpl-python-coverage.yml
    with:
      service_key: ${{ matrix.key }}
      working_directory: ${{ matrix.dir }}

  rust:
    name: coverage (rust)
    needs: load-registry
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.load-registry.outputs.rust) }}

    uses: ./.github/workflows/tpl-rust-coverage.yml
    with:
      service_key: ${{ matrix.key }}
      working_directory: ${{ matrix.dir }}
      needs_mongo: ${{ matrix.needs_mongo }}

  go:
    name: coverage (go)
    needs: load-registry
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.load-registry.outputs.go) }}

    uses: ./.github/workflows/tpl-go-coverage.yml
    with:
      service_key: ${{ matrix.key }}
      working_directory: ${{ matrix.dir }}

  publish:
    name: publish coverage-data
    needs: [node, python, rust, go]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"

      - name: Download coverage reports
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: coverage-artifacts

      - name: Aggregate into badge.json + summary.json
        run: python scripts/coverage-summary.py coverage-artifacts .

      # Build a single-commit orphan branch holding only the two generated files.
      # History lives in nothing — each run force-replaces the branch wholesale.
      - name: Publish to coverage-data branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan coverage-data-tmp
          git rm -rf --cached . > /dev/null 2>&1 || true
          git add -f badge.json summary.json
          git commit -m "coverage: ${SHA:0:7}"
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" coverage-data-tmp:coverage-data
