name: Cleanup Packages

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 0" # Weekly at 2AM UTC on Sunday

permissions:
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package-name:
          - crowdvision-auth
          - crowdvision-chat
          - crowdvision-twin
          - crowdvision-notification
          - crowdvision-socket
          - crowdvision-agent
          - crowdvision-sensor
          - crowdvision-contracts
          - crowdvision-simulator
          - crowdvision-aq-simulator
          - crowdvision-client

    steps:
      - name: Delete old package versions for ${{ matrix.package-name }}
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5
        with:
          package-name: ${{ matrix.package-name }}
          package-type: "container"
          min-versions-to-keep: 3
          # explicitly protect the 'latest' tag from deletion
          ignore-versions: "latest"
