name: documentation

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "documentation/**"

permissions:
  contents: write

concurrency:
  group: deploy-docs
  cancel-in-progress: true

jobs:
  build-documentation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV

      - uses: quarkdown-labs/setup-quarkdown@v1

      - name: Build user docs
        run: quarkdown c documentation/user/main.qd --out landing-page/user

      - name: Build dev docs
        run: quarkdown c documentation/developer/main.qd --out landing-page/dev

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./landing-page
          force_orphan: true
