name: CodeQL

on:
  workflow_dispatch:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  # Monday 03:00 UTC
  schedule:
    - cron: "0 3 * * 1"

# A newer commit on the same ref supersedes an in-flight scan — no point
# finishing a scan of code that has already been replaced.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
          # build-mode: none extracts from source without compiling
          - language: rust
            build-mode: none
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      # No Autobuild step: every language runs build-mode: none, so CodeQL
      # extracts from source without a compile. (For js-ts and python the old
      # Autobuild step was already a no-op; none is the correct modern setting.)
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          category: "/language:${{ matrix.language }}"
