name: Docker Build

on:
  workflow_call:
    inputs:
      images:
        description: >-
          JSON matrix (include-form) of { context, image } objects to build.
          The gate populates this with only the services that changed.
        required: true
        type: string

jobs:
  # One job per changed image. The gate skips calling this workflow entirely
  # when nothing relevant changed, so the matrix is never empty here.
  build:
    name: docker (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.images) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: 🐳 Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ matrix.context }}/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # push: false — this is a PR build check, not a publish (cd-registry
      # publishes on master). The gha cache is scoped per image so each
      # service reuses its own layers across runs without evicting the others.
      - name: 🏗️ Build ${{ matrix.image }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          push: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
