name: Docker Build

on:
  workflow_call:
    inputs:
      images:
        description: >-
          JSON matrix (include-form) of { context, image, lang } objects to build.
        required: true
        type: string

jobs:
  build:
    name: docker (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.images) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Extract Service Key
        id: parse
        run: echo "service_key=$(echo '${{ matrix.image }}' | sed 's/crowdvision-//')" >> "$GITHUB_OUTPUT"

      # go/rust/node CI jobs upload their compiled output as an artifact so
      # the Docker build doesn't need to recompile. python and client have no
      # such artifact — they build straight from their own real Dockerfile.
      - name: Download Build Artifact
        if: matrix.lang == 'go' || matrix.lang == 'rust' || matrix.lang == 'node'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ${{ matrix.lang == 'node' && 'dist' || 'binary' }}-${{ steps.parse.outputs.service_key }}
          path: ./downloaded-artifacts/${{ steps.parse.outputs.service_key }}

      - name: Resolve Dockerfile and build args
        id: build
        run: |
          case "${{ matrix.lang }}" in
            go)
              echo "file=.github/docker/Dockerfile.ci" >> "$GITHUB_OUTPUT"
              echo "args=BINARY_PATH=./downloaded-artifacts/${{ steps.parse.outputs.service_key }}/app-binary" >> "$GITHUB_OUTPUT"
              ;;
            rust)
              # cargo names the binary after the crate (server/twin-service -> "twin-service"),
              # which is also the basename of matrix.context.
              bin=$(basename "${{ matrix.context }}")
              echo "file=.github/docker/Dockerfile.ci" >> "$GITHUB_OUTPUT"
              echo "args=BINARY_PATH=./downloaded-artifacts/${{ steps.parse.outputs.service_key }}/$bin" >> "$GITHUB_OUTPUT"
              ;;
            node)
              {
                echo "file=.github/docker/Dockerfile.node.ci"
                echo "args<<ARGSEOF"
                echo "SERVICE_DIR=${{ matrix.context }}"
                echo "ARTIFACT_PATH=./downloaded-artifacts/${{ steps.parse.outputs.service_key }}"
                echo "ARGSEOF"
              } >> "$GITHUB_OUTPUT"
              ;;
            python|client)
              # No pre-built artifact for these — build from the service's own
              # real Dockerfile, with the repo root as context so it can still
              # COPY sibling directories (e.g. agent-service <- auth-policy).
              echo "file=${{ matrix.context }}/Dockerfile" >> "$GITHUB_OUTPUT"
              echo "args=" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: ${{ steps.build.outputs.file }}
          build-args: ${{ steps.build.outputs.args }}
          push: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
