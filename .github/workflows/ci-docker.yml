name: Docker Build

on:
  workflow_call:
    inputs:
      images:
        description: >-
          JSON matrix (include-form) of { context, image } objects to build.
          The gate populates this with only the services that changed.
        required: true
        type: string

jobs:
  # One job per changed image. The gate skips calling this workflow entirely
  # when nothing relevant changed, so the matrix is never empty here.
  build:
    name: docker (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.images) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: 🐳 Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: ${{ matrix.context }}/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      # push: false — this is a PR build check, not a publish (cd-registry
      # publishes on master). The gha cache is scoped per image so each
      # service reuses its own layers across runs without evicting the others.
      - name: 🏗️ Build ${{ matrix.image }}
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          push: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
