name: Docker Build

on:
  workflow_call:
    inputs:
      images:
        description: >-
          JSON matrix (include-form) of { context, image } objects to build.
          The gate populates this with only the services that changed.
        required: true
        type: string

jobs:
  build:
    name: docker (${{ matrix.image }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(inputs.images) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf
        with:
          dockerfile: ${{ matrix.dockerfile }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      # push: false — this is a PR build check, not a publish (cd-registry
      # publishes on master). gha cache is scoped per image so services don't evict each other's layers.
      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
