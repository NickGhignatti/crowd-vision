name: Security Audit
on: [pull_request]
jobs:
  audit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory:
          - "."
          - "client"
          - "server/auth-service"
          - "server/notification-service"
          - "server/socket-service"
          - "server/twin-service"
          - "server/agent-service"
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Audit Dependencies
        run: cd ${{ matrix.directory }} && npm audit --audit-level=high --omit=dev