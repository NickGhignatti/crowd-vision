name: client

on:
  workflow_call:

jobs:
  quality:
    name: lint + type-check + audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint

      - name: 🏗️ Type Check
        run: npm run type-check

      - name: 🔒 Audit dependencies
        run: npm audit --audit-level=high --omit=dev

  test:
    name: unit tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    defaults:
      run:
        working-directory: ./client
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run Unit Tests
        run: npm run test:unit -- run --shard=${{ matrix.shard }}/${{ strategy.job-total }}
