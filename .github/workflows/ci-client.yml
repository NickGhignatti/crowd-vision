name: client

on:
  workflow_call:

jobs:
  client-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: "npm"
          cache-dependency-path: client/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint

      - name: 🏗️ Type Check
        # Runs vue-tsc to check for TypeScript errors
        run: npm run type-check

      - name: 🧪 Run Unit Tests
        # Runs vitest as defined in your package.json
        run: npm run test:unit
