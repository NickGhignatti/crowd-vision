name: push images to ghcr
on:
  workflow_dispatch:
  push:
    branches: [ "master" ]
    paths:
      - "docker-compose.yml"
      - "server/**"
      - "client/**"
      - ".github/workflows/images-push.yml"

env:
  REGISTRY: ghcr.io
  # IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set lowercase image prefix
        run: |
          OWNER_LOWERCASE=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_PREFIX=ghcr.io/$OWNER_LOWERCASE" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build + push each service as a separate image
      # use docker/build-push-action instead of docker compose build
      # because it supports push, caching, and multi-platform builds natively

      - name: Build and push auth-service
        uses: docker/build-push-action@v6
        with:
          context: ./server/auth-service
          push: true
          tags: |
              ${{ env.IMAGE_PREFIX }}/crowdvision-auth:latest
              ${{ env.IMAGE_PREFIX }}/crowdvision-auth:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push twin-service
        uses: docker/build-push-action@v6
        with:
          context: ./server/twin-service
          push: true
          tags: |
              ${{ env.IMAGE_PREFIX }}/crowdvision-twin:latest
              ${{ env.IMAGE_PREFIX }}/crowdvision-twin:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push notification-service
        uses: docker/build-push-action@v6
        with:
          context: ./server/notification-service
          push: true
          tags: |
              ${{ env.IMAGE_PREFIX }}/crowdvision-notification:latest
              ${{ env.IMAGE_PREFIX }}/crowdvision-notification:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push socket-service
        uses: docker/build-push-action@v6
        with:
          context: ./server/socket-service
          push: true
          tags: |
              ${{ env.IMAGE_PREFIX }}/crowdvision-socket:latest
              ${{ env.IMAGE_PREFIX }}/crowdvision-socket:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push agent-service
        uses: docker/build-push-action@v6
        with:
          context: ./server/agent-service
          push: true
          tags: |
              ${{ env.IMAGE_PREFIX }}/crowdvision-agent:latest
              ${{ env.IMAGE_PREFIX }}/crowdvision-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push client
        uses: docker/build-push-action@v6
        with:
          context: ./client
          push: true
          # The client needs build args for the Vite env vars baked at build time
          build-args: |
            VITE_SERVER_URL=${{ vars.VITE_SERVER_URL }}
            VITE_VAPID_PUBLIC_KEY=${{ secrets.VITE_VAPID_PUBLIC_KEY }}
          tags: |
              ${{ env.IMAGE_PREFIX }}/crowdvision-client:latest
              ${{ env.IMAGE_PREFIX }}/crowdvision-client:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
              
      # Output the SHA so it's easy to see which tag was produced
      - name: Print image tags
        run: |
          echo "Images pushed with tag: ${{ github.sha }}"
          echo "Pull with: docker pull ${{ env.IMAGE_PREFIX }}/crowdvision-auth:${{ github.sha }}"