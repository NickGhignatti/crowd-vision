name: chat-service-ci

on:
  workflow_call:

jobs:
  chat-service:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./server/chat-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: |
            server/chat-service/package-lock.json
            tooling/eslint-config/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔧 Install shared ESLint config
        working-directory: tooling/eslint-config
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint

      - name: 🏗️ Build
        run: npm run build

      - name: 🧪 Run Server Tests
        run: npm run test

      - name: 🔒 Audit dependencies
        run: npm audit --audit-level=high --omit=dev
