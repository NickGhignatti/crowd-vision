name: chat-service-ci

on:
  workflow_call:

jobs:
  chat-service:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./server/chat-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: |
            server/chat-service/package-lock.json
            tooling/eslint-config/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install Shared ESLint Config
        working-directory: tooling/eslint-config
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run Tests
        run: npm run test:coverage

      - name: Coverage summary
        if: always()
        run: |
          jq -r '.total | "| **chat-service** | \(.lines.pct)% | \(.branches.pct)% | \(.functions.pct)% |"' \
            coverage/coverage-summary.json >> "$GITHUB_STEP_SUMMARY" || true

      - name: Audit Production Dependencies
        run: npm audit --audit-level=high --omit=dev

      - name: Audit All Dependencies
        run: npm audit --audit-level=high
        continue-on-error: true
