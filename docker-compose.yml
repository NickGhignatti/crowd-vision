services:
  gateway:
    image: caddy:latest
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - gateway-net
    depends_on:
      - auth-service
      - twin-service
      - simulator-service
      - sensor-service
      - socket-server

  redis:
    image: redis:alpine
    container_name: crowd-vision-broker
    ports:
      - "6379:6379"
    networks:
      - gateway-net

  prometheus:
    image: prom/prometheus:latest
    container_name: crowd-vision-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.external-url=${DEV_URL}/prometheus/'
      - '--web.route-prefix=/'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - gateway-net

  grafana:
    image: grafana/grafana:latest
    container_name: crowd-vision-grafana
    environment:
      - GF_SERVER_ROOT_URL=${DEV_URL}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - gateway-net
    depends_on:
      - prometheus

networks:
  gateway-net:
    driver: bridge
  auth-net:
  twin-net:
  simulator-net:
  sensor-net:
  notification-net:
  agent-net:

volumes:
  caddy_data:
  caddy_config:
  grafana_data:

