# Shared infrastructure only.
# Service compose files are assembled dynamically by scripts/compose-run.mjs
# (invoked via the Justfile).
services:
  gateway:
    image: caddy:latest
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    # required: false ⇒ if a service is excluded from the run, gateway still
    # starts (Caddy will retry connections when the service eventually appears).
    depends_on:
      auth-service:
        condition: service_started
        required: false
      twin-service:
        condition: service_started
        required: false
      sensor-service:
        condition: service_started
        required: false
      socket-server:
        condition: service_started
        required: false

  redis:
    image: redis:alpine
    container_name: crowd-vision-broker
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:latest
    container_name: crowd-vision-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.external-url=${DEV_URL}/prometheus/'
      - '--web.route-prefix=/'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    container_name: crowd-vision-grafana
    environment:
      - GF_SERVER_ROOT_URL=${DEV_URL}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  caddy_data:
  caddy_config:
  grafana_data:
