services:
  gateway:
    image: caddy:latest
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      claims-gateway:
        condition: service_started
        required: false
      twin-service:
        condition: service_started
        required: false
      sensor-service:
        condition: service_started
        required: false
      socket-server:
        condition: service_started
        required: false
      chat-service:
        condition: service_started
        required: false

  redis:
    image: redis:alpine
    container_name: services-broker
    restart: always
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-langfuse:
    image: redis:alpine
    container_name: langfuse-broker
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Identity provider for every tier (Phase 1 of the auth/tenancy redesign).
  # Own host port, not a Caddy subpath: Keycloak's own asset paths assume it
  # owns the origin, the same reason langfuse-web gets a direct port below.
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: crowd-vision-keycloak
    command: ["start-dev", "--features=organization", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?set in .env}
      # Pinned (not dynamic per-request) so the `iss` claim Keycloak stamps
      # into every token is stable — claims-gateway reaches Keycloak over the
      # internal Docker hostname (OIDC_DISCOVERY_URL) but validates tokens
      # against this externally-visible one (OIDC_ISSUER); see
      # claims-gateway's oidcverifier package for why they can differ.
      KC_HOSTNAME: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8090}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?set in .env}
      # Enables ${ENV_VAR:default} substitution in the imported realm JSON so the
      # Google identity provider's client id/secret come from the environment,
      # not from git. Only the realm-import path reads these.
      JAVA_OPTS_APPEND: -Dkeycloak.migration.replace-placeholders=true
      # Google social login (brokered). Empty by default — set both in .env to
      # activate the "Continue with Google" button; see keycloak/README-google.md.
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-not-configured}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-not-configured}
      # Serve /health/ready on the management port (9000) so the healthcheck
      # below — and claims-gateway's depends_on service_healthy — actually work.
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8090:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      keycloak-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\r\nhost: localhost\r\nConnection: close\r\n\r\n' >&3 && grep -q '\"UP\"' <&3"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  keycloak-db:
    image: postgres:17-alpine
    container_name: crowd-vision-keycloak-db
    restart: always
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?set in .env}
      POSTGRES_DB: keycloak
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 3s
      timeout: 3s
      retries: 10
      # Crash recovery after an unclean shutdown fsyncs the data dir (~30-40s
      # here) during which pg_isready fails; without this the container flips to
      # unhealthy before recovery finishes and keycloak's service_healthy
      # dependency aborts the whole stack.
      start_period: 60s

  prometheus:
    image: prom/prometheus:latest
    container_name: crowd-vision-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.external-url=${DEV_URL}/prometheus/"
      - "--web.route-prefix=/"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus.rules.yml:/etc/prometheus/prometheus.rules.yml:ro

  grafana:
    image: grafana/grafana:latest
    container_name: crowd-vision-grafana
    environment:
      - GF_SERVER_ROOT_URL=${DEV_URL}/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  langfuse-web:
    image: docker.io/langfuse/langfuse:3
    container_name: crowd-vision-langfuse
    restart: always
    depends_on: &langfuse-depends-on
      langfuse-db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "3030:3000"
    environment: &langfuse-env
      DATABASE_URL: postgresql://postgres:postgres@langfuse-db:5432/postgres
      NEXTAUTH_URL: ${DEV_URL:-http://localhost}:3030
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      TELEMETRY_ENABLED: "false"
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      REDIS_HOST: redis-langfuse
      REDIS_PORT: "6379"
      REDIS_AUTH: ""
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-crowd-vision}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-Crowd-Vision}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-agent-service}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-agent-service}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-admin@crowd-vision.local}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-Admin}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-langfuse-admin}

  langfuse-worker:
    image: docker.io/langfuse/langfuse-worker:3
    container_name: crowd-vision-langfuse-worker
    restart: always
    depends_on: *langfuse-depends-on
    environment:
      <<: *langfuse-env

  langfuse-db:
    image: pgvector/pgvector:pg17
    container_name: crowd-vision-langfuse-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      TZ: UTC
      PGTZ: UTC
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
      # See keycloak-db: crash recovery fsync can outlast the retry budget and
      # trip unhealthy before postgres accepts connections.
      start_period: 60s

  clickhouse:
    image: docker.io/clickhouse/clickhouse-server
    container_name: crowd-vision-clickhouse
    restart: always
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD}
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s

  minio:
    image: cgr.dev/chainguard/minio
    container_name: crowd-vision-minio
    restart: always
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: ${LANGFUSE_MINIO_ROOT_PASSWORD}
    volumes:
      - langfuse_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 2s

volumes:
  caddy_data:
  caddy_config:
  grafana_data:
  langfuse_postgres_data:
  langfuse_clickhouse_data:
  langfuse_clickhouse_logs:
  langfuse_minio_data:
  keycloak_postgres_data:
