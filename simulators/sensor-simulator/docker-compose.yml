services:
  sensor-simulator:
    build:
      context: .
    ports:
      - "3001:3000"
    # Resolve `host.docker.internal` on hosts that don't provide it automatically
    # (Docker Engine / WSL2). The simulator rewrites localhost targets to this
    # hostname to reach the gateway published on the host's port 80.
    extra_hosts:
      - "host.docker.internal:host-gateway"
