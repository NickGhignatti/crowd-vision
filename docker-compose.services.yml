services:
  socket-server:
    build: server/socket-service
    container_name: crowd-vision-socket
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=${DEV_URL}:${CLIENT_PORT}
    depends_on:
      - redis
    networks:
      - gateway-net

  auth-service:
    build: server/auth-service
    environment:
      - MONGO_URI=mongodb://auth-db:27017/authdb
      - JWT_SECRET=${JWT_SECRET}
      - VITE_SERVER_URL=${DEV_URL}:${SERVER_PORT}
      - CLIENT_URL=${DEV_URL}:${CLIENT_PORT}
      - INTERNAL_ADMIN_SECRET=${INTERNAL_ADMIN_SECRET}
    networks:
      - gateway-net
      - auth-net

  twin-service:
    build: server/twin-service
    environment:
      - MONGO_URI=mongodb://twin-db:27017/twindb
      - CLIENT_URL=${DEV_URL}:${CLIENT_PORT}
      - SENSOR_SERVICE_URL=http://sensor-service:3000
    networks:
      - gateway-net
      - twin-net

  sensor-service:
    build: server/sensor-service
    environment:
      - MONGO_URI=mongodb://sensor-db:27017/sensordb
      - CLIENT_URL=${DEV_URL}:${CLIENT_PORT}
      - VITE_SERVER_URL=http://gateway
    networks:
      - gateway-net
      - sensor-net

  notification-service:
    build: server/notification-service
    environment:
      - REDIS_URL=redis://redis:6379
      - MONGO_URI=mongodb://notification-db:27017/notificationdb
      - VITE_SERVER_URL=http://gateway
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - CLIENT_URL=${DEV_URL}:${CLIENT_PORT}
    depends_on:
      - redis
    networks:
      - gateway-net
      - notification-net

  agent-service:
    build: server/agent-service
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - POSTGRES_URL=postgresql+asyncpg://agent:agent@agent-db:5432/agentdb
      - RERANKER=${RERANKER:-noop}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      - agent-db
    networks:
      - gateway-net
      - agent-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:3000/health',timeout=2).status==200 else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  agent-ingester:
    image: node:20-alpine
    working_dir: /workspace
    environment:
      - AGENT_URL=http://agent-service:3000
    volumes:
      - ./scripts:/workspace/scripts:ro
      - ./documentation:/workspace/documentation:ro
      - ./.env:/workspace/.env:ro
    command: ["node", "scripts/ingest-docs.js"]
    depends_on:
      agent-service:
        condition: service_healthy
    networks:
      - gateway-net
    restart: "no"

