language: 'typescript'

# Vite/Vitest app — inherits the shared TS pipeline but overrides the tasks that
# differ from a plain service (different build inputs, vitest, TS eslint config).
tasks:
  build:
    command: 'npm run build'
    # replace, not append, the args inherited from typescript.yml's build
    options:
      mergeArgs: 'replace'
      mergeInputs: 'replace'
    inputs:
      - 'src/**/*'
      - 'public/**/*'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - 'env.d.ts'
      - 'package.json'
    outputs:
      - 'dist'

  test:
    command: 'npm run test:unit'
    options:
      mergeArgs: 'replace'
      mergeInputs: 'replace'
    inputs:
      - 'src/**/*'
      - 'vitest.config.ts'
      - 'package.json'

  # command inherited (npm run lint); replace inputs so we track this project's
  # TS eslint config instead of the inherited eslint.config.mjs (which it lacks).
  lint:
    options:
      mergeInputs: 'replace'
    inputs:
      - 'src/**/*'
      - 'eslint.config.ts'
