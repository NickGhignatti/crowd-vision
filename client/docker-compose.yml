services:
  client:
    container_name: vue-client
    build:
      context: .
      args:
        VITE_SERVER_URL: ${DEV_URL}:${SERVER_PORT}
        VITE_VAPID_PUBLIC_KEY: ${VITE_VAPID_PUBLIC_KEY}
        VITE_SIMULATOR_URL_AQ: ${DEV_URL}/simulator/aq
        VITE_SIMULATOR_URL_TP: ${DEV_URL}/simulator/tp
        # Browser-reachable Keycloak URL — NOT the internal Docker hostname claims-gateway
        # uses (OIDC_DISCOVERY_URL); same discovery-vs-issuer split as claims-gateway (see its CLAUDE.md).
        VITE_KEYCLOAK_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8090}
    ports:
      - "${CLIENT_PORT}:8080"
    environment:
      - PORT=${CLIENT_PORT}
      - VITE_SIMULATOR_URL_AQ=${DEV_URL}/simulator/aq
      - VITE_SIMULATOR_URL_TP=${DEV_URL}/simulator/tp
      - VITE_KEYCLOAK_URL=${KEYCLOAK_PUBLIC_URL:-http://localhost:8090}
    depends_on:
      claims-gateway:
        condition: service_started
        required: false
      gateway:
        condition: service_started
