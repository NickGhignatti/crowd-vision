services:
  gateway:
    ports: []

  auth-db:
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "quit(db.runCommand({ ping: 1 }).ok ? 0 : 2)"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  twin-db:
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "quit(db.runCommand({ ping: 1 }).ok ? 0 : 2)"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  sensor-db:
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "quit(db.runCommand({ ping: 1 }).ok ? 0 : 2)"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  notification-db:
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "quit(db.runCommand({ ping: 1 }).ok ? 0 : 2)"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  agent-db:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agentdb"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    ports: []
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  auth-service:
    depends_on:
      auth-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  twin-service:
    depends_on:
      twin-db:
        condition: service_healthy
      sensor-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  sensor-service:
    depends_on:
      sensor-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/metrics').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  notification-service:
    environment:
      - VITE_SERVER_URL=http://gateway
      - VAPID_PUBLIC_KEY=
      - VAPID_PRIVATE_KEY=
    depends_on:
      redis:
        condition: service_healthy
      notification-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/public-key').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  socket-server:
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  agent-service:
    environment:
      - GOOGLE_API_KEY=integration-test-google-api-key
      - DEEPSEEK_API_KEY=
      - JWT_SECRET=integration-jwt-secret
      - POSTGRES_URL=postgresql+asyncpg://agent:agent@agent-db:5432/agentdb
      - RERANKER=noop
    depends_on:
      agent-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:3000/health',timeout=2).status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s

  metrics-service:
    build: ./server/metrics-service
    environment:
      - PORT=3000
      - SENSOR_METRICS_URL=http://sensor-service:3000
    depends_on:
      sensor-service:
        condition: service_healthy
    networks:
      - gateway-net

  integration-tests:
    image: node:24-alpine
    working_dir: /workspace
    command: ["node", "scripts/integration/backend-integration.mjs"]
    volumes:
      - ./scripts/integration:/workspace/scripts/integration:ro
    depends_on:
      auth-service:
        condition: service_healthy
      twin-service:
        condition: service_healthy
      sensor-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      socket-server:
        condition: service_healthy
      agent-service:
        condition: service_healthy
      metrics-service:
        condition: service_started
      gateway:
        condition: service_started
    networks:
      - gateway-net
    restart: "no"
