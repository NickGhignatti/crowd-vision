services:
  client:
    container_name: vue-client
    build:
      context: ./client
      args:
        VITE_SERVER_URL: ${DEV_URL}:${SERVER_PORT}
        VITE_VAPID_PUBLIC_KEY: ${VITE_VAPID_PUBLIC_KEY}
    ports:
      - "${CLIENT_PORT}:8080"
    environment:
      - PORT=${CLIENT_PORT}
    networks:
      - gateway-net
    depends_on:
      - auth-service
      - gateway

