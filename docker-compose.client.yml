services:
  client:
    container_name: vue-client
    build:
      context: client
      args:
        VITE_SERVER_URL: ${DEV_URL}:${SERVER_PORT}
        VITE_VAPID_PUBLIC_KEY: ${VITE_VAPID_PUBLIC_KEY}
        VITE_SIMULATOR_URL_AQ: ${DEV_URL}/simulator/aq
        VITE_SIMULATOR_URL_TP: ${DEV_URL}/simulator/tp
    ports:
      - "${CLIENT_PORT}:8080"
    environment:
      - PORT=${CLIENT_PORT}
      - VITE_SIMULATOR_URL_AQ=${DEV_URL}/simulator/aq
      - VITE_SIMULATOR_URL_TP=${DEV_URL}/simulator/tp
    networks:
      - gateway-net
    depends_on:
      - auth-service
      - gateway

